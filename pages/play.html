<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUKTHAI - เล่น</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../styles-friend-enhanced.css">
<link rel="stylesheet" href="../mobile.css" media="screen and (max-width: 900px)">
<script type="module" src="../auth.js"></script>
<style>
.play-body { overflow-x: hidden !important; overflow-y: hidden !important; }

.play-main {
  height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-layout {
  display: grid;
  grid-template-columns: auto 300px;
  gap: 40px;
  align-items: center;
  justify-content: center;
  justify-items: center;
  padding: 0 40px;
  width: 100%;
  max-width: 980px;
  margin: 0 auto;
}

/* ── Board ── */
.board-section {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.board-outer {
  display: flex;
  gap: 10px;
  position: relative;
}

.board-display-overlay {
  position: absolute;
  inset: 0;
  z-index: 5;
  cursor: default;
}

.coords-col {
  display: flex;
  flex-direction: column;
  justify-content: space-around;
}

.coords-row {
  display: flex;
  justify-content: space-around;
  margin-left: 22px;
  margin-top: 4px;
}

.coord {
  font-size: 11px;
  color: var(--text);
  font-weight: 500;
  text-align: center;
  line-height: 1;
  width: 14px;
}

html[data-background-mode="light"] .coord {
    color:var(--text);
}

.chess-board {
  display: grid;
  grid-template-columns: repeat(8, var(--cell));
  grid-template-rows: repeat(8, var(--cell));
  gap: 2px;
}

.chess-cell {
  width: var(--cell);
  height: var(--cell);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: default;
  border-radius: 0;
}

.chess-cell.light { background: #c56c30; }
.chess-cell.dark  { background: #c56c30; }

.chess-cell .piece-img {
  width: calc(var(--cell) * 0.82);
  height: calc(var(--cell) * 0.82);
  object-fit: contain;
  pointer-events: none;
}

/* ── Side Menu ── */
.side-menu {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.side-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.side-title-icon { font-size: 26px; }

.side-title-text {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.menu-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 18px;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
  width: 100%;
  text-align: left;
  font-family: 'Segoe UI', sans-serif;
}

.menu-card:hover {
  background: rgba(128,128,128,0.09);
  border-color: rgba(128,128,128,0.28);
  transform: translateX(5px);
}

.menu-card-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.menu-card-icon.online  { background: rgba(96,165,250,0.12); }
.menu-card-icon.bot     { background: rgba(74,222,128,0.12); }
.menu-card-icon.friend  { background: rgba(251,146,60,0.12); }
.menu-card-icon.tourney { background: rgba(250,204,21,0.12); }

.menu-card-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}

.menu-card-desc {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}

.menu-card-arrow {
  margin-left: auto;
  color: rgba(128,128,128,0.35);
  font-size: 20px;
  transition: transform 0.2s, color 0.2s;
}

.menu-card:hover .menu-card-arrow {
  transform: translateX(4px);
  color: var(--text);
}

/* ══════════════════════════════
   TIME SELECTION MODAL
   ══════════════════════════════ */
.time-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  animation: fadeIn 0.2s ease;
}

.time-overlay.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.time-modal {
  width: min(560px, 95vw);
  background: var(--bg2);
  border: 1px solid rgba(128,128,128,0.18);
  border-radius: 28px;
  padding: 36px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1);
}

.time-modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(128,128,128,0.55), transparent);
  border-radius: 28px 28px 0 0;
}

.time-modal-header {
  text-align: center;
  margin-bottom: 28px;
}

.time-modal-icon {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.time-modal-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.time-modal-sub {
  font-size: 0.9rem;
  color: var(--muted);
}

/* Difficulty selector */
.diff-section {
  margin-bottom: 20px;
}

.diff-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-align: center;
}

.diff-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.diff-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans Thai', sans-serif;
  color: var(--muted);
}

.diff-option:hover {
  background: rgba(128,128,128,0.1);
  color: var(--text);
  transform: translateY(-2px);
}

.diff-option-emoji { font-size: 1.5rem; }

.diff-option-name {
  font-size: 13px;
  font-weight: 700;
  color: inherit;
}

.diff-option-desc {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  line-height: 1.3;
}

.diff-option.selected {
  border-color: rgba(128,128,128,0.45);
  background: rgba(128,128,128,0.12);
  color: var(--text);
}

.diff-option[data-depth="1"].selected { border-color: rgba(74,222,128,0.55); background: rgba(74,222,128,0.08); color: #4ade80; }
.diff-option[data-depth="2"].selected { border-color: rgba(251,191,36,0.55); background: rgba(251,191,36,0.08); color: #fbbf24; }
.diff-option[data-depth="3"].selected { border-color: rgba(239,68,68,0.55);  background: rgba(239,68,68,0.08);  color: #ef4444; }
.diff-option[data-depth="4"].selected { border-color: rgba(168,85,247,0.55); background: rgba(168,85,247,0.08); color: #a855f7; }

.section-divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
  margin: 4px 0 20px;
}

.time-section-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-align: center;
}

.time-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.time-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text);
}

.time-option:hover {
  background: rgba(128,128,128,0.1);
  border-color: rgba(128,128,128,0.35);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(128,128,128,0.15);
}

.time-option.selected {
  background: linear-gradient(135deg, rgba(128,128,128,0.2), rgba(128,128,128,0.08));
  border-color: rgba(128,128,128,0.5);
  box-shadow: 0 0 0 2px rgba(128,128,128,0.15);
}

.time-option-emoji { font-size: 1.8rem; }

.time-option-label {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

.time-option-desc {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
}

.time-modal-actions {
  display: flex;
  gap: 12px;
}

.btn-cancel {
  flex: 1;
  padding: 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.95rem;
  transition: all 0.2s;
}

.btn-cancel:hover {
  background: rgba(255,255,255,0.09);
  color: var(--text);
}

.btn-start {
  flex: 2;
  padding: 13px;
  background: linear-gradient(135deg,#555555,#888888);
  border: none;
  border-radius: 14px;
  color: #ffffff;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.95rem;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(128,128,128,0.25);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(128,128,128,0.35);
}

.btn-start:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.time-modal-close {
  position: absolute;
  right: 18px; top: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  color: var(--muted);
  font-size: 1rem;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.time-modal-close:hover {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}

/* Board cell highlight override for display-only */
.chess-cell { pointer-events: none; }
</style>
</head>
<body class="play-body">
<header class="topbar">
  <div class="left">
    <a href="play.html" class="logo">
      <div class="logo-icon">
        <img class="logo-dark" src="/Images/DarkLOGO.png" alt="RUKTHAI logo dark">
        <img class="logo-light" src="/Images/LightLOGO.png" alt="RUKTHAI logo light">
      </div>
    </a>
    <nav class="nav">
            <a href="play.html">เล่น</a>
            <a href="tournament.html">ทัวร์นาเมนต์</a>
            <a href="learn.html">เรียนรู้</a>
            <a href="watch.html">ดูเกม</a>
            <a href="community.html">ชุมชน</a>
      <input class="search" placeholder="ค้นหาผู้เล่น...">
    </nav>
  </div>
  <div class="right">
    <button class="register">ลงทะเบียน</button>
    <button class="login">เข้าสู่ระบบ</button>
  </div>
</header>

<main class="main">
  <section class="hero">
    <div class="play-main">
      <div class="play-layout">

        <!-- Board Section (display only) -->
        <div class="board-section">
          <div class="board-outer">
            <!-- overlay blocks interaction -->
            <div class="board-display-overlay"></div>
            <div class="coords-col" id="coords-left"></div>
            <div>
              <div class="chess-board" id="chess-board"></div>
              <div class="coords-row" id="coords-bottom"></div>
            </div>
          </div>
        </div>

        <!-- Side Menu -->
        <div class="side-menu">
          <div class="side-title">
            <span class="side-title-icon">♟</span>
            <span class="side-title-text">เล่นหมากรุก</span>
          </div>

          <button class="menu-card" id="btn-online">
            <div class="menu-card-icon online">⚡</div>
            <div>
              <div class="menu-card-title">เล่นออนไลน์</div>
              <div class="menu-card-desc">จับคู่กับผู้เล่นระดับใกล้เคียงกัน</div>
            </div>
            <span class="menu-card-arrow">›</span>
          </button>

          <button class="menu-card" id="btn-bot">
            <div class="menu-card-icon bot">🤖</div>
            <div>
              <div class="menu-card-title">เล่นกับ BOT</div>
              <div class="menu-card-desc">ท้าทาย AI ตั้งแต่ระดับง่ายถึงยาก</div>
            </div>
            <span class="menu-card-arrow">›</span>
          </button>

          <button class="menu-card" id="btn-friend">
            <div class="menu-card-icon friend">🤝</div>
            <div>
              <div class="menu-card-title">เล่นกับเพื่อน</div>
              <div class="menu-card-desc">ชวนเพื่อนมาเล่นด้วยกัน</div>
            </div>
            <span class="menu-card-arrow">›</span>
          </button>

          <button class="menu-card" id="btn-tourney">
            <div class="menu-card-icon tourney">🏆</div>
            <div>
              <div class="menu-card-title">ทัวร์นาเมนต์</div>
              <div class="menu-card-desc">เข้าร่วมการแข่งขันและลุ้นรางวัล</div>
            </div>
            <span class="menu-card-arrow">›</span>
          </button>
        </div>

      </div>
    </div>
  </section>
</main>

<!-- Time Selection Modal -->
<div class="time-overlay hidden" id="time-overlay">
  <div class="time-modal">
    <button class="time-modal-close" id="close-time-modal">✕</button>
    <div class="time-modal-header">
      <div class="time-modal-icon">🤖</div>
      <div class="time-modal-title">เล่นกับ BOT</div>
      <div class="time-modal-sub">ตั้งค่าก่อนเริ่มเกม</div>
    </div>

    <!-- Difficulty -->
    <div class="diff-section">
      <div class="diff-label">ระดับความยาก</div>
      <div class="diff-options">
        <button class="diff-option" data-depth="1">
          <span class="diff-option-emoji">🌱</span>
          <span class="diff-option-name">ง่าย</span>
          <span class="diff-option-desc">เหมาะมือใหม่</span>
        </button>
        <button class="diff-option selected" data-depth="2">
          <span class="diff-option-emoji">⚔️</span>
          <span class="diff-option-name">กลาง</span>
          <span class="diff-option-desc">ท้าทายพอดี</span>
        </button>
        <button class="diff-option" data-depth="3">
          <span class="diff-option-emoji">🔥</span>
          <span class="diff-option-name">ยาก</span>
          <span class="diff-option-desc">ต้องใช้สมอง</span>
        </button>
        <button class="diff-option" data-depth="4">
          <span class="diff-option-emoji">👑</span>
          <span class="diff-option-name">เซียน</span>
          <span class="diff-option-desc">แทบชนะไม่ได้</span>
        </button>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- Time -->
    <div class="time-section-label">เวลาต่อฝ่าย</div>
    <div class="time-options">
      <button class="time-option" data-minutes="5">
        <span class="time-option-emoji">⚡</span>
        <span class="time-option-label">5 นาที</span>
        <span class="time-option-desc">Blitz</span>
      </button>
      <button class="time-option" data-minutes="10">
        <span class="time-option-emoji">⏱</span>
        <span class="time-option-label">10 นาที</span>
        <span class="time-option-desc">Rapid</span>
      </button>
      <button class="time-option" data-minutes="30">
        <span class="time-option-emoji">🏛</span>
        <span class="time-option-label">30 นาที</span>
        <span class="time-option-desc">Classical</span>
      </button>
    </div>

    <div class="time-modal-actions">
      <button class="btn-cancel" id="cancel-time">ยกเลิก</button>
      <button class="btn-start" id="start-bot" disabled>⚔ เริ่มเกม</button>
    </div>
  </div>
</div>

<script>
// ── Render display-only board ──
const initialBoard = [
  ['Rb','Nb','Bb','Qb','Kb','Bb','Nb','Rb'],
  [null,null,null,null,null,null,null,null],
  ['Pb','Pb','Pb','Pb','Pb','Pb','Pb','Pb'],
  [null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null],
  ['Pw','Pw','Pw','Pw','Pw','Pw','Pw','Pw'],
  [null,null,null,null,null,null,null,null],
  ['Rw','Nw','Bw','Kw','Qw','Bw','Nw','Rw'],
];

function calcCellSize() {
  const topbarH = 64;
  const availableHeight = window.innerHeight - topbarH - 60;
  const availableWidth = window.innerWidth > 900 ? window.innerWidth - 420 : window.innerWidth - 80;
  const cell = Math.floor(Math.min(availableHeight, availableWidth) / 8);
  return Math.max(32, Math.min(cell, 90));
}

function applyCell(size) {
  document.documentElement.style.setProperty('--cell', `${size}px`);
  const left = document.getElementById('coords-left');
  const bottom = document.getElementById('coords-bottom');
  if (left) left.style.height = `${size * 8}px`;
  if (bottom) bottom.style.width = `${size * 8}px`;
}

function setupCoords() {
  const cols = ['ก','ข','ค','ง','จ','ฉ','ช','ซ'];
  const rows = [8,7,6,5,4,3,2,1];
  const left = document.getElementById('coords-left');
  const bottom = document.getElementById('coords-bottom');
  left.replaceChildren();
  bottom.replaceChildren();
  rows.forEach(v => {
    const el = document.createElement('span');
    el.className = 'coord';
    el.textContent = v;
    left.appendChild(el);
  });
  cols.forEach(v => {
    const el = document.createElement('span');
    el.className = 'coord';
    el.textContent = v;
    bottom.appendChild(el);
  });
}

function renderDisplayBoard() {
  const boardEl = document.getElementById('chess-board');
  boardEl.replaceChildren();
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const cell = document.createElement('div');
      cell.className = `chess-cell ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
      const piece = initialBoard[row][col];
      if (piece) {
        const img = document.createElement('img');
        img.className = 'piece-img';
        img.src = `../Pieces/${piece}.png`;
        img.alt = piece;
        cell.appendChild(img);
      }
      boardEl.appendChild(cell);
    }
  }
}

applyCell(calcCellSize());
setupCoords();
renderDisplayBoard();
window.addEventListener('resize', () => {
  applyCell(calcCellSize());
  setupCoords();
});

// ── Modal logic ──
let selectedMinutes = null;
let selectedDepth = 2; // default กลาง

const overlay = document.getElementById('time-overlay');

document.getElementById('btn-bot').addEventListener('click', () => {
  overlay.classList.remove('hidden');
  selectedMinutes = null;
  document.querySelectorAll('.time-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('start-bot').disabled = true;
});

document.getElementById('close-time-modal').addEventListener('click', () => {
  overlay.classList.add('hidden');
});

document.getElementById('cancel-time').addEventListener('click', () => {
  overlay.classList.add('hidden');
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.add('hidden');
});

// Difficulty buttons
document.querySelectorAll('.diff-option').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-option').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDepth = parseInt(btn.dataset.depth);
  });
});

// Time buttons
document.querySelectorAll('.time-option').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-option').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMinutes = parseInt(btn.dataset.minutes);
    document.getElementById('start-bot').disabled = false;
  });
});

document.getElementById('start-bot').addEventListener('click', () => {
  if (!selectedMinutes) return;
  window.location.href = `play-bot.html?time=${selectedMinutes}&depth=${selectedDepth}`;
});

// Online play — open matchmaking page
document.getElementById('btn-online').addEventListener('click', () => {
  window.location.href = 'play-online.html';
});
document.getElementById('btn-friend').addEventListener('click', () => {
  alert('เล่นกับเพื่อน — เร็วๆ นี้!');
});
document.getElementById('btn-tourney').addEventListener('click', () => {
  alert('ทัวร์นาเมนต์ — เร็วๆ นี้!');
});
</script>
</body>
</html>

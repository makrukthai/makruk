<head>

<script src="../game.js"></script> <style>
.play-body { overflow-x: hidden !important; overflow-y: auto !important; }

.play-main {
  height: calc(100vh - 64px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.play-layout {
  display: grid;
  grid-template-columns: auto 300px;
  gap: 40px;
  align-items: center;
  justify-content: center;
  justify-items: center;
  padding: 0 40px;
  width: 100%;
  max-width: 980px;
  margin: 0 auto;
}

/* แผ่นใสสำหรับบังกระดานไม่ให้กดหรือลากได้ */
.board-display-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  cursor: default;
}

/* ── Side Menu ── */
.side-menu {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.side-title {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.side-title-icon { font-size: 26px; }

.side-title-text {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}

.menu-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--bg2);
  border: none;
  border-radius: 16px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 2px 10px rgba(0,0,0,0.22);
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
  position: relative;
  overflow: hidden;
  width: 100%;
  text-align: left;
  font-family: var(--font-ui, 'Segoe UI', sans-serif);
}

/* ไล่เฉดสีตามหมวด — จำง่าย แยกชัด */
.menu-card.c-online  { background: linear-gradient(135deg, #2e90f0, #3b4fd6); }
.menu-card.c-bot     { background: linear-gradient(135deg, #1fb866, #0e9488); }
.menu-card.c-tourney { background: linear-gradient(135deg, #f5b528, #e07b1a); }
.menu-card.c-analyze { background: linear-gradient(135deg, #8b5cf6, #5b3fd6); }

.menu-card:hover {
  transform: translateX(4px);
  filter: brightness(1.08);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 8px 22px rgba(0,0,0,0.3);
}
.menu-card:hover .menu-card-arrow { color: #fff; transform: translateX(3px); }

.menu-card-icon {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.2);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
}

.menu-card-title {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 2px;
}

.menu-card-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.82);
  line-height: 1.4;
}

.menu-card-arrow {
  margin-left: auto;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  transition: transform 0.2s, color 0.2s;
}

.menu-card:hover .menu-card-arrow {
  transform: translateX(4px);
  color: #fff;
}

/* ══════════════════════════════
   TIME SELECTION MODAL
   ══════════════════════════════ */
.time-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  animation: fadeIn 0.2s ease;
}

.time-overlay.hidden { display: none; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.time-modal {
  width: min(560px, 95vw);
  background: var(--bg2);
  border: 1px solid rgba(128,128,128,0.18);
  border-radius: 28px;
  padding: 36px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1);
}

.time-modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, rgba(128,128,128,0.55), transparent);
  border-radius: 28px 28px 0 0;
}

.time-modal-header {
  text-align: center;
  margin-bottom: 28px;
}

.time-modal-icon {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.time-modal-title {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.time-modal-sub {
  font-size: 0.9rem;
  color: var(--muted);
}

/* Difficulty selector */
.diff-section {
  margin-bottom: 20px;
}

.diff-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-align: center;
}

.diff-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.diff-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Noto Sans Thai', sans-serif;
  color: var(--muted);
}

.diff-option:hover {
  background: rgba(128,128,128,0.1);
  color: var(--text);
  transform: translateY(-2px);
}

.diff-option-emoji { font-size: 1.5rem; }

.diff-option-name {
  font-size: 13px;
  font-weight: 700;
  color: inherit;
}

.diff-option-desc {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  line-height: 1.3;
}

.diff-option.selected {
  border-color: rgba(128,128,128,0.45);
  background: rgba(128,128,128,0.12);
  color: var(--text);
}

.diff-option[data-depth="1"].selected { border-color: rgba(74,222,128,0.55); background: rgba(74,222,128,0.08); color: #4ade80; }
.diff-option[data-depth="2"].selected { border-color: rgba(251,191,36,0.55); background: rgba(251,191,36,0.08); color: #fbbf24; }
.diff-option[data-depth="3"].selected { border-color: rgba(239,68,68,0.55);  background: rgba(239,68,68,0.08);  color: #ef4444; }
.diff-option[data-depth="4"].selected { border-color: rgba(168,85,247,0.55); background: rgba(168,85,247,0.08); color: #a855f7; }

.section-divider {
  height: 1px;
  background: rgba(255,255,255,0.07);
  margin: 4px 0 20px;
}

.time-section-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-align: center;
}

.time-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 20px;
}

.time-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding: 20px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Segoe UI', sans-serif;
  color: var(--text);
}

.time-option:hover {
  background: rgba(128,128,128,0.1);
  border-color: rgba(128,128,128,0.35);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(128,128,128,0.15);
}

.time-option.selected {
  background: linear-gradient(135deg, rgba(128,128,128,0.2), rgba(128,128,128,0.08));
  border-color: rgba(128,128,128,0.5);
  box-shadow: 0 0 0 2px rgba(128,128,128,0.15);
}

.time-option-emoji { font-size: 1.8rem; }

.time-option-label {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

.time-option-desc {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
}

.time-modal-actions {
  display: flex;
  gap: 12px;
}

.btn-cancel {
  flex: 1;
  padding: 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.95rem;
  transition: all 0.2s;
}

.btn-cancel:hover {
  background: rgba(255,255,255,0.09);
  color: var(--text);
}

.btn-start {
  flex: 2;
  padding: 13px;
  background: linear-gradient(135deg,#555555,#888888);
  border: none;
  border-radius: 14px;
  color: #ffffff;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Segoe UI', sans-serif;
  font-size: 0.95rem;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(128,128,128,0.25);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(128,128,128,0.35);
}

.btn-start:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

.time-modal-close {
  position: absolute;
  right: 18px; top: 18px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 50%;
  color: var(--muted);
  font-size: 1rem;
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}

.time-modal-close:hover {
  background: rgba(255,255,255,0.12);
  color: var(--text);
}

/* Light Theme overrides for modal */
html[data-background-mode="light"] .time-modal {
  border: 1px solid rgba(0,0,0,0.1);
}
</style>
</head>

<div class="time-overlay hidden" id="time-overlay">

<script>
// ── 📌 Render Display-Only Board โดยใช้ game.js ส่วนกลาง ──
function calcCellSizeForPlay() {
  const topbarH = 64;
  const availableHeight = window.innerHeight - topbarH - 60;
  const availableWidth = window.innerWidth > 900 ? window.innerWidth - 420 : window.innerWidth - 80;
  const cell = Math.floor(Math.min(availableHeight, availableWidth) / 8);
  return Math.max(32, Math.min(cell, 90));
}

// ตั้งค่าให้หน้าจอนี้ไม่มีสิทธิ์ขยับหมาก
window.myColor = null; 
window.gameOver = true; 

function renderStaticBoard() {
  window.applyCell(calcCellSizeForPlay());
  window.setupCoords(false); // false = ขาวอยู่ล่าง
  
  // สั่งวาดกระดานด้วย INITIAL_BOARD โดยไม่ส่งฟังก์ชันคลิกเข้าไป
  window.renderBoard(
    window.INITIAL_BOARD, 
    null, // ไม่มีหมากที่เลือก
    [],   // ไม่มีตาเดิน
    null, // ไม่มีตาเดินล่าสุด
    'w',  // ให้เหมือนตาขาวเริ่มเดิน
    false, // ไม่หมุนกระดาน
    null, // ไม่มี event onclick
    null  // ไม่มี event drop
  );
}

// โหลดครั้งแรกและผูก event เวลาย่อ/ขยายจอ
renderStaticBoard();
window.addEventListener('resize', renderStaticBoard);

// ── Modal logic สำหรับสร้างห้องเล่นกับ Bot ──
let selectedMinutes = null;
let selectedDepth = 2; // default กลาง

const overlay = document.getElementById('time-overlay');

document.getElementById('btn-bot').addEventListener('click', () => {
  overlay.classList.remove('hidden');
  selectedMinutes = null;
  document.querySelectorAll('.time-option').forEach(o => o.classList.remove('selected'));
  document.getElementById('start-bot').disabled = true;
});

document.getElementById('close-time-modal').addEventListener('click', () => {
  overlay.classList.add('hidden');
});

document.getElementById('cancel-time').addEventListener('click', () => {
  overlay.classList.add('hidden');
});

overlay.addEventListener('click', (e) => {
  if (e.target === overlay) overlay.classList.add('hidden');
});

// เลือกระดับความยาก
document.querySelectorAll('.diff-option').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-option').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    selectedDepth = parseInt(btn.dataset.depth);
  });
});

// เลือกเวลา
document.querySelectorAll('.time-option').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.time-option').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMinutes = parseInt(btn.dataset.minutes);
    document.getElementById('start-bot').disabled = false;
  });
});

document.getElementById('start-bot').addEventListener('click', () => {
  if (!selectedMinutes) return;
  window.location.href = `play-bot.html?time=${selectedMinutes}&depth=${selectedDepth}`;
});
document.getElementById('btn-online').addEventListener('click', () => {
  window.location.href = 'play-online.html';
});
document.getElementById('btn-tourney').addEventListener('click', () => {
  window.location.href = 'tournament.html';
});
document.getElementById('btn-analysis').addEventListener('click', () => {
  window.location.href = 'analysis.html';
});
</script>

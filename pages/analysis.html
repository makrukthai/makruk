<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RUKTHAI - วิเคราะห์เกม & จัดกระดาน</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../styles-friend-enhanced.css">
<link rel="stylesheet" href="../game.css">
<link rel="stylesheet" href="../mobile.css" media="screen and (max-width: 900px)">
<script type="module" src="../auth.js"></script>
<script src="../game.js"></script>
<style>
.play-body { 
  overflow-x: hidden; 
  overflow-y: auto;
  background: var(--bg);
  /* ป้องกันการเผลอคลุมดำหรือซูมหน้าจอบนมือถือ */
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

.analysis-main {
  min-height: calc(100vh - 64px);
  display: flex;
  align-items: flex-start; /* เปลี่ยนจาก center เป็น flex-start เพื่อให้บอร์ดอยู่ด้านบนเสมอในมือถือ */
  justify-content: center;
  padding: 20px 0;
}

.analysis-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 280px;
  align-items: start;
  gap: 24px;
  width: 100%;
  max-width: 1200px;
  padding: 0 20px;
}

.board-container-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.right-panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 280px;
  background: transparent;
}

/* ── Mode Selector ── */
.mode-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  background: rgba(0, 0, 0, 0.2);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}

html[data-background-mode="light"] .mode-selector {
  background: rgba(0, 0, 0, 0.06);
  border: 1px solid rgba(0,0,0,0.08);
}

.mode-btn {
  padding: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 9px;
  transition: all 0.2s;
  font-family: 'Noto Sans Thai', sans-serif;
}

.mode-btn.active {
  background: var(--bg2);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* ── Piece Palette (กระบะเลือกหมาก) ── */
.palette-card {
  padding: 14px;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
}

html[data-background-mode="light"] .palette-card {
  border: 1px solid rgba(0,0,0,0.12);
}

.palette-title {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 10px;
  font-weight: 600;
}

.palette-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}

.palette-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 1;
  transition: all 0.15s;
}

.palette-btn:hover {
  background: rgba(128,128,128,0.12);
}

.palette-btn.selected {
  background: rgba(128,128,128,0.22);
  border-color: rgba(160,160,160,0.6);
  box-shadow: 0 0 0 2px rgba(128,128,128,0.15);
}

.palette-btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.palette-btn.eraser {
  grid-column: span 6;
  aspect-ratio: auto;
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  gap: 6px;
}

.palette-btn.eraser.selected {
  border-color: #ef4444;
  background: rgba(239,68,68,0.1);
  color: #ef6464;
}

.action-buttons-vertical {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-toggle-turn {
  background: rgba(128,128,128,0.1);
  color: var(--text);
  border-color: rgba(128,128,128,0.2);
}

.btn-start-custom {
  background: linear-gradient(135deg, #22c55e, #16a34a) !important;
  color: white !important;
  border: none !important;
  font-weight: 700 !important;
  padding: 12px 8px !important;
  box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
}
.btn-start-custom:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(34, 197, 94, 0.4);
}

/* 📌 ปรับแต่งสำหรับหน้าจอมือถือโดยเฉพาะ */
@media screen and (max-width: 850px) {
  .analysis-main {
    padding: 10px 0 30px 0; /* ลดช่องว่างด้านบน */
  }

  .analysis-layout {
    grid-template-columns: 1fr; /* ยุบรวมเป็นคอลัมน์เดียว */
    gap: 16px;
    padding: 0 12px;
  }

  .right-panel {
    width: 100%;
  }

  /* เรียงปุ่มกดใหม่บนมือถือให้เป็น 2 คอลัมน์ ไม่เปลืองที่แนวตั้ง */
  .action-buttons-vertical {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* ปุ่มเริ่มเล่น, ล้างกระดาน และ กลับหน้าหลัก ให้กว้างเต็มบรรทัด */
  .btn-start-custom, .btn-clear-board, #btn-back {
    grid-column: span 2;
  }
}
</style>
</head>
<body class="play-body">

<header class="topbar">
  <div class="left">
    <a href="play.html" class="logo">
      <div class="logo-icon">
        <img class="logo-dark"  src="/Images/DarkLOGO.png"  alt="RUKTHAI logo dark">
        <img class="logo-light" src="/Images/LightLOGO.png" alt="RUKTHAI logo light">
      </div>
    </a>
    <nav class="nav mobile-hidden">
      <a href="play.html">เล่น</a>
      <a href="tournament.html">ทัวร์นาเมนต์</a>
      <a href="learn.html">เรียนรู้</a>
      <a href="watch.html">ดูเกม</a>
      <a href="community.html">ชุมชน</a>
    </nav>
  </div>
  <div class="right">
    <button class="register">ลงทะเบียน</button>
    <button class="login">เข้าสู่ระบบ</button>
  </div>
</header>

<main class="main">
  <section class="hero">
    <div class="analysis-main">
      <div class="analysis-layout">

        <div class="board-container-col">
          <div class="board-section">
            <div class="board-outer">
              <div class="coords-col" id="coords-left"></div>
              <div>
                <div class="chess-board" id="chess-board"></div>
                <div class="coords-row" id="coords-bottom"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          
          <div class="mode-selector">
            <button class="mode-btn active" id="mode-analyze-btn">🔄 ทดลองเดิน</button>
            <button class="mode-btn" id="mode-setup-btn">🛠 จัดกระดาน</button>
          </div>

          <div class="status-card">
            <div class="status-title">ฝ่ายที่ต้องเดิน</div>
            <div class="status-text" id="game-status">ตาของฝ่ายขาว</div>
            <button class="btn-action btn-toggle-turn" id="btn-toggle-turn" style="margin-top: 8px; padding: 6px;">
              🔄 สลับฝั่งเดินหมาก
            </button>
          </div>

          <div class="palette-card hidden" id="palette-card">
            <div class="palette-title">หมากสีขาว (White Pieces)</div>
            <div class="palette-grid">
              <button class="palette-btn" data-piece="Kw"><img src="../Pieces/Kw.png" alt="ขุน"></button>
              <button class="palette-btn" data-piece="Qw"><img src="../Pieces/Qw.png" alt="เม็ด"></button>
              <button class="palette-btn" data-piece="Bw"><img src="../Pieces/Bw.png" alt="โคน"></button>
              <button class="palette-btn" data-piece="Nw"><img src="../Pieces/Nw.png" alt="ม้า"></button>
              <button class="palette-btn" data-piece="Rw"><img src="../Pieces/Rw.png" alt="เรือ"></button>
              <button class="palette-btn" data-piece="Pw"><img src="../Pieces/Pw.png" alt="เบี้ย"></button>
            </div>
            
            <div class="palette-title">หมากสีดำ (Black Pieces)</div>
            <div class="palette-grid">
              <button class="palette-btn" data-piece="Kb"><img src="../Pieces/Kb.png" alt="ขุน"></button>
              <button class="palette-btn" data-piece="Qb"><img src="../Pieces/Qb.png" alt="เม็ด"></button>
              <button class="palette-btn" data-piece="Bb"><img src="../Pieces/Bb.png" alt="โคน"></button>
              <button class="palette-btn" data-piece="Nb"><img src="../Pieces/Nb.png" alt="ม้า"></button>
              <button class="palette-btn" data-piece="Rb"><img src="../Pieces/Rb.png" alt="เรือ"></button>
              <button class="palette-btn" data-piece="Pb"><img src="../Pieces/Pb.png" alt="เบี้ย"></button>
            </div>

            <button class="palette-btn eraser" id="eraser-btn">
              ❌ <span>ใช้ยางลบ (ลบตัวหมาก)</span>
            </button>
          </div>

          <div class="action-buttons-vertical">
            <button class="btn-action btn-start-custom hidden" id="btn-start-custom">▶ เริ่มเดินหมากตามกติกา</button>
            <button class="btn-action hidden" id="btn-clear-board">🧹 ล้างกระดานให้ว่าง</button>
            
            <button class="btn-action" id="btn-reset-board">🔄 ตั้งกระดานเริ่มต้น</button>
            <button class="btn-action" id="btn-flip">🔄 หมุนกระดาน</button>
            <button class="btn-action danger" id="btn-back">‹ กลับหน้าหลัก</button>
          </div>

        </div>

      </div>
    </div>
  </section>
</main>

<script>
// ════════════════════════════════════════════════
//   STATE VARIABLES
// ════════════════════════════════════════════════
let currentMode = 'analyze';   
let activePaletteTool = null;  

let boardState = window.cloneBoard(window.INITIAL_BOARD);
let turn = 'w';
let selected = null, legalForSelected = [];
let lastMove = null;
let flipped = false;
let analysisGameOver = false; 

// ════════════════════════════════════════════════
//   LAYOUT & RENDER CORES
// ════════════════════════════════════════════════
function calcCell() {
  const isMobile = window.innerWidth <= 850;
  
  if (isMobile) {
    // 📌 บนมือถือให้เน้นขยายความกว้างเต็มจอ (เผื่อขอบไว้เล็กน้อย)
    const availableWidth = window.innerWidth - 32; 
    return Math.max(30, Math.floor(availableWidth / 8));
  } else {
    // บน PC คำนวณแบบเดิม
    const overallMargin = 64 + 80 + 100; 
    const ah = window.innerHeight - overallMargin;
    const aw = window.innerWidth - 340;
    return Math.max(34, Math.min(Math.floor(Math.min(ah, aw) / 8), 76));
  }
}

function updateLayoutSize() {
  const size = calcCell();
  window.applyCell(size);
  window.setupCoords(flipped);
}

function syncSharedStateAndRender() {
  window.myColor = turn;
  window.gameOver = analysisGameOver; 

  window.renderBoard(
    boardState, 
    selected, 
    legalForSelected, 
    lastMove, 
    turn, 
    flipped, 
    handleCellClick, 
    attemptMove
  );
}

function updateStatusUI() {
  const statusEl = document.getElementById('game-status');
  statusEl.style.color = ''; 
  
  if (analysisGameOver) {
    const isCheck = window.isInCheck(boardState, turn);
    if (isCheck) {
      statusEl.textContent = `รุกจน! ฝ่าย${turn === 'w' ? 'ขาว' : 'ดำ'} พ่ายแพ้`;
      statusEl.style.color = '#ef4444';
    } else {
      statusEl.textContent = `อับ! เสมอกัน`;
    }
    return;
  }

  const isCheck = window.isInCheck(boardState, turn);
  let txt = `ตาของฝ่าย${turn === 'w' ? 'ขาว' : 'ดำ'}`;
  if (isCheck) {
    txt += ` ⚠ (ขุนถูกรุก!)`;
  }
  statusEl.textContent = txt;
}

// ════════════════════════════════════════════════
//   CLICK & DRAG CONTROLLER INTERFACES
// ════════════════════════════════════════════════
function handleCellClick(row, col) {
  if (currentMode === 'setup') {
    if (activePaletteTool === 'eraser') {
      boardState[row][col] = null;
    } else if (activePaletteTool) {
      boardState[row][col] = activePaletteTool;
    }
    selected = null;
    legalForSelected = [];
    lastMove = null;
    analysisGameOver = false; 
    syncSharedStateAndRender();
    updateStatusUI();
    return;
  }

  if (analysisGameOver) return; 

  const piece = boardState[row][col];
  if (selected) {
    const move = legalForSelected.find(m => m.to.row === row && m.to.col === col);
    if (move) {
      executeAnalysisMove(move);
      return;
    }
  }

  if (piece && window.colorOf(piece) === turn) {
    selected = { row, col };
    legalForSelected = window.getLegalMoves(boardState, row, col);
  } else {
    selected = null;
    legalForSelected = [];
  }
  syncSharedStateAndRender();
}

function attemptMove(from, to) {
  if (currentMode === 'setup') {
    const piece = boardState[from.row]?.[from.col];
    if (piece) {
      boardState[to.row][to.col] = piece;
      boardState[from.row][from.col] = null;
    }
    selected = null;
    legalForSelected = [];
    lastMove = null;
    analysisGameOver = false;
    syncSharedStateAndRender();
    updateStatusUI();
    return;
  }

  if (analysisGameOver) return;

  const piece = boardState[from.row]?.[from.col];
  if (!piece || window.colorOf(piece) !== turn) return;
  const moves = window.getLegalMoves(boardState, from.row, from.col);
  const move = moves.find(m => m.to.row === to.row && m.to.col === to.col);
  if (!move) return;
  executeAnalysisMove(move);
}

function executeAnalysisMove(move) {
  const piece = boardState[move.from.row][move.from.col];
  const promoted = window.promoteIfNeeded(piece, move.to.row);
  
  boardState[move.to.row][move.to.col] = promoted;
  boardState[move.from.row][move.from.col] = null;

  lastMove = move;
  selected = null;
  legalForSelected = [];
  turn = window.opposite(turn); 

  const availableMoves = window.getAllLegalMoves(boardState, turn);
  if (availableMoves.length === 0) {
    analysisGameOver = true;
  }

  syncSharedStateAndRender();
  updateStatusUI();
}

// ════════════════════════════════════════════════
//   UI INTERACTIVE INTERFACES & EVENTS
// ════════════════════════════════════════════════

document.getElementById('mode-analyze-btn').addEventListener('click', () => {
  currentMode = 'analyze';
  document.getElementById('mode-analyze-btn').classList.add('active');
  document.getElementById('mode-setup-btn').classList.remove('active');
  document.getElementById('palette-card').classList.add('hidden');
  
  document.getElementById('btn-clear-board').classList.add('hidden');
  document.getElementById('btn-start-custom').classList.add('hidden');
  
  activePaletteTool = null;
  document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('selected'));
  
  const availableMoves = window.getAllLegalMoves(boardState, turn);
  analysisGameOver = (availableMoves.length === 0);
  
  selected = null;
  legalForSelected = [];
  syncSharedStateAndRender();
  updateStatusUI();
});

document.getElementById('mode-setup-btn').addEventListener('click', () => {
  currentMode = 'setup';
  document.getElementById('mode-setup-btn').classList.add('active');
  document.getElementById('mode-analyze-btn').classList.remove('active');
  document.getElementById('palette-card').classList.remove('hidden');
  
  document.getElementById('btn-clear-board').classList.remove('hidden');
  document.getElementById('btn-start-custom').classList.remove('hidden');
  
  selected = null;
  legalForSelected = [];
  analysisGameOver = false; 
  syncSharedStateAndRender();
  updateStatusUI();
});

document.getElementById('btn-start-custom').addEventListener('click', () => {
  document.getElementById('mode-analyze-btn').click();
  // บนมือถือเมื่อกดปุ่มนี้ ให้เลื่อนหน้าจอกลับไปที่กระดานด้านบนสุด
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.querySelectorAll('.palette-btn[data-piece]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (currentMode !== 'setup') return;
    document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    activePaletteTool = btn.dataset.piece;
  });
});

document.getElementById('eraser-btn').addEventListener('click', () => {
  if (currentMode !== 'setup') return;
  document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('selected'));
  const eraser = document.getElementById('eraser-btn');
  eraser.classList.add('selected');
  activePaletteTool = 'eraser';
});

document.getElementById('btn-toggle-turn').addEventListener('click', () => {
  turn = window.opposite(turn);
  selected = null;
  legalForSelected = [];
  
  if (currentMode === 'analyze') {
    const availableMoves = window.getAllLegalMoves(boardState, turn);
    analysisGameOver = (availableMoves.length === 0);
  }
  
  syncSharedStateAndRender();
  updateStatusUI();
});

document.getElementById('btn-clear-board').addEventListener('click', () => {
  boardState = Array(8).fill(null).map(() => Array(8).fill(null));
  selected = null;
  legalForSelected = [];
  lastMove = null;
  analysisGameOver = false;
  syncSharedStateAndRender();
  updateStatusUI();
});

document.getElementById('btn-reset-board').addEventListener('click', () => {
  boardState = window.cloneBoard(window.INITIAL_BOARD);
  turn = 'w';
  selected = null;
  legalForSelected = [];
  lastMove = null;
  analysisGameOver = false;
  syncSharedStateAndRender();
  updateStatusUI();
});

document.getElementById('btn-flip').addEventListener('click', () => {
  flipped = !flipped;
  window.setupCoords(flipped);
  syncSharedStateAndRender();
});

document.getElementById('btn-back').addEventListener('click', () => {
  window.location.href = 'play.html';
});

window.addEventListener('resize', () => {
  updateLayoutSize();
  syncSharedStateAndRender();
});

// ════════════════════════════════════════════════
//   INITIAL APP LOAD
// ════════════════════════════════════════════════
updateLayoutSize();
syncSharedStateAndRender();
updateStatusUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUKTHAI - รีเพลย์หมากรุกไทย</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<script type="module" src="../auth.js"></script>
<style>
  .history-body { background: var(--bg); color: var(--text); font-family: 'Noto Sans Thai', sans-serif; padding-bottom: 40px; min-height: 100vh; }
  .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
  .page-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; color: #f0d8a1; }
  
  /* Loading Screen */
  .loading-box { text-align: center; padding: 60px; color: var(--muted); font-size: 18px; }
  
  /* Replay Section Layout */
  .replay-layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 24px; margin-top: 20px; align-items: start; }
  .board-outer { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .board-stack { display: flex; flex-direction: column; align-items: center; }
  .chess-board { --cell: 70px; display: grid; grid-template-columns: repeat(8, var(--cell)); grid-template-rows: repeat(8, var(--cell)); gap: 2px; background: rgba(0,0,0,0.2); padding: 2px; }
  .coords-col { display: grid; grid-template-rows: repeat(8, var(--cell)); gap: 2px; align-items: center; justify-items: center; }
  .coords-row { display: grid; grid-template-columns: repeat(8, var(--cell)); gap: 2px; align-items: center; justify-items: center; margin-left: 0; margin-top: 4px; }
  .coord { font-size: 11px; color: var(--text); font-weight: 500; text-align: center; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .chess-cell { width: var(--cell); height: var(--cell); display: flex; align-items: center; justify-content: center; border: none; }
  .chess-cell.light { background: #c56c30; }
  .chess-cell.dark  { background: #c56c30; }
  .chess-cell .piece-img { width: 82%; height: 82%; object-fit: contain; }
  
  /* Controller Panel */
  .control-panel { background: var(--bg2); border-radius: 14px; padding: 20px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; justify-content: space-between; }
  .control-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 12px; }
  .btn-ctrl { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.2s; }
  .btn-ctrl:hover { background: rgba(255,255,255,0.1); border-color: #f0d8a1; color: #f0d8a1; }
  .btn-ctrl:disabled { opacity: 0.3; cursor: not-allowed; }
  .move-counter { text-align: center; font-size: 16px; font-weight: 700; margin: 12px 0; color: #f0d8a1; font-family: monospace; }
  .btn-back-profile { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text); padding: 8px 14px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; font-size: 13px; font-family: 'Noto Sans Thai', sans-serif; transition: 0.2s; }
  .btn-back-profile:hover { background: rgba(255,255,255,0.05); border-color: #f0d8a1; }
  /* ตารางบันทึกตาเดิน */
  .move-list { height: 300px; overflow-y: auto; background: var(--bg2); border-radius: 8px; padding: 10px; font-family: 'Noto Sans Thai', sans-serif; font-size: 14px; }
  .move-row { display: grid; grid-template-columns: 40px 1fr 1fr; border-bottom: 1px solid rgba(128,128,128,0.1); padding: 8px 0; }
  .move-row span { text-align: center; }
</style>
</head>
<body class="history-body">

<header class="topbar">
  <div class="left">
    <a href="play.html" class="logo">
      <div class="logo-icon">
        <img class="logo-dark" src="/Images/DarkLOGO.png" alt="RUKTHAI logo dark">
        <img class="logo-light" src="/Images/LightLOGO.png" alt="RUKTHAI logo light">

    </a>
    <nav class="nav">
      <a href="play.html">เล่น</a>
      <a href="tournament.html">ทัวร์นาเมนต์</a>
      <a href="learn.html">เรียนรู้</a>
      <a href="watch.html">ดูเกม</a>
      <a href="community.html">ชุมชน</a>
    </nav>

</header>

<div class="container" id="replay-screen-section">
  <button class="btn-back-profile" id="btn-back-to-profile">⬅ กลับไปหน้าโปรไฟล์</button>
  <h1 class="page-title" id="replay-title">กระดานบันทึกเกมย้อนหลัง</h1>

  <div class="replay-layout hidden" id="replay-content-layout">
    <div class="board-outer">
      <div class="chess-board" id="replay-chess-board"></div>
    </div>
    
    <div class="control-panel">
  <div style="margin-bottom: 10px;">
    <h3 style="margin:0 0 10px; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px;">📊 สรุปผลหมาก</h3>
    <p id="replay-meta-moves" style="margin: 6px 0; font-size:14px; line-height:1.6;"></p>
    <p id="replay-meta-players" style="margin: 6px 0; font-size:14px; line-height:1.6;"></p>
    <p id="replay-meta-reason" style="margin: 12px 0 6px; font-size:13px; color:var(--muted); font-style:italic;"></p>
  </div>

  <div class="move-list" id="move-list-container" style="flex-grow: 1; overflow-y: auto; margin-bottom: 10px; background: rgba(0,0,0,0.1); border-radius: 8px; padding: 5px;">
    <div class="move-row" style="display: grid; grid-template-columns: 40px 1fr 1fr; font-weight:bold; padding: 5px; border-bottom: 1px solid rgba(128,128,128,0.3);">
      <span>ตา</span><span>ขาว</span><span>ดำ</span>
    </div>
    <div id="move-list-body"></div>
  </div>
  
  <div>
    <div class="control-buttons">
      <button class="btn-ctrl" id="btn-first" title="ตาแรกสุด">|◀</button>
      <button class="btn-ctrl" id="btn-prev" title="ถอยกลับ">◀</button>
      <button class="btn-ctrl" id="btn-next" title="เดินหน้า">▶</button>
      <button class="btn-ctrl" id="btn-last" title="ตาสุดท้าย">▶|</button>
    </div>
  </div>
</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── Firebase Config ──
const firebaseConfig = {
  apiKey:            "AIzaSyCJjQsqiJsbJW0pwlI0fqnklRhKFPSJh_w",
  authDomain:        "rukthai-b4971.firebaseapp.com",
  databaseURL:       "https://rukthai-b4971-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "rukthai-b4971",
  storageBucket:     "rukthai-b4971.firebasestorage.app",
  messagingSenderId: "140554271105",
  appId:             "1:140554271105:web:00530dbfb7b8c4aed1d080"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let loadedMoves = [];
let currentMovePointer = 0;
let replayFlipped = false;

const INITIAL_BOARD = [
  ['Rb','Nb','Bb','Qb','Kb','Bb','Nb','Rb'],
  [null,null,null,null,null,null,null,null],
  ['Pb','Pb','Pb','Pb','Pb','Pb','Pb','Pb'],
  [null,null,null,null,null,null,null,null],
  [null,null,null,null,null,null,null,null],
  ['Pw','Pw','Pw','Pw','Pw','Pw','Pw','Pw'],
  [null,null,null,null,null,null,null,null],
  ['Rw','Nw','Bw','Kw','Qw','Bw','Nw','Rw'],
];

function fbToBoard(fb) {
  if (!fb) return INITIAL_BOARD;
  return fb.map(r => r.split(',').map(c => c || null));
}

function boardToFB(board) {
  return board.map(row => row.map(c => c || '')).map(r => r.join(','));
}

// ─── โดดดึงข้อมูลแมตช์ด้วยรหัสห้องจาก URL พารามิเตอร์ ───
async function initReplayPage() {
  const urlParams = new URLSearchParams(window.location.search);
  const roomId = urlParams.get('room');

  if (!roomId) {
    const loadingBox = document.getElementById('loading-box');
    if (loadingBox) loadingBox.textContent = "❌ ไม่พบรหัสห้องเกมที่ระบุสำหรับเปิดรีเพลย์";
    return;
  }

  try {
    const snapshot = await get(ref(db, `game_history/${roomId}`));
    if (!snapshot.exists()) {
      const loadingBox = document.getElementById('loading-box');
      if (loadingBox) loadingBox.textContent = "❌ ไม่พบประวัติบันทึกตาเดินของห้องเกมนี้ในฐานข้อมูลกลาง";
      return;
    }

    const gameData = snapshot.val();
    const movesCount = gameData.moves ? Object.keys(gameData.moves).length : 0;
    document.getElementById('replay-meta-moves').textContent = `จำนวนตาเดินทั้งหมด: ${movesCount} ตา`;
    
    // ตั้งค่าเริ่มต้น: ตาที่ 0 คือตำแหน่งหมากตั้งต้นของกระดาน
    loadedMoves = [];
    loadedMoves.push({ board: boardToFB(INITIAL_BOARD), moveCount: 0 });

    // ดึงค่าสเต็ปตาเดินที่เก็บบันทึกไว้มาประกอบลง Array
    if (gameData.moves) {
      const rawMoves = Object.values(gameData.moves).sort((a, b) => a.moveCount - b.moveCount);
      loadedMoves.push(...rawMoves);
    }

    // ดึงประวัติว่าผู้เล่นล็อกอินปัจจุบันเล่นสีอะไร เพื่อทำการกลับกระดานให้เหมาะสม
    const currentUserRaw = localStorage.getItem('rukthai_current_user');
    if (currentUserRaw) {
      const u = JSON.parse(currentUserRaw);
      const safeUid = String(u.id || u.email).replace(/[.#$\[\]]/g, '_');
      // ถ้าเราเล่นฝั่งหมากดำ (playerB) ให้กลับกระดานอัตโนมัติ
      if (gameData.b && gameData.b.uid === safeUid) {
        replayFlipped = true;
      }
    }

    // แสดงรายละเอียดแมตช์บนการ์ดด้านข้าง
    const nameW = gameData.w?.name || 'ฝ่ายขาว';
    const nameB = gameData.b?.name || 'ฝ่ายดำ';
    document.getElementById('replay-title').textContent = `⚔️ รีเพลย์แมตช์: ${nameW} VS ${nameB}`;
    document.getElementById('replay-meta-players').innerHTML = `⚪ ฝ่ายขาว: <strong>${nameW}</strong><br>⚫ ฝ่ายดำ: <strong>${nameB}</strong>`;
    
    // แปลงประเภทผลลัพธ์การจบเกมให้อ่านง่าย
    const reasonLabels = { 'checkmate': 'รุกจน', 'resign': 'มีฝ่ายกดยอมแพ้', 'timeout': 'หมดเวลาในการเดินหมาก', 'draw-offer': 'ตกลงเสมอกันทั้งสองฝ่าย' };
    document.getElementById('replay-meta-reason').textContent = `รูปแบบการจบเกม: ${reasonLabels[gameData.finalReason] || gameData.finalReason || 'จบแมตช์ปกติ'}`;

    // ซ่อนข้อความดาวน์โหลด เปิดส่วนกระดานควบคุม
    const loadingBox = document.getElementById('loading-box');
    if (loadingBox) loadingBox.classList.add('hidden');
    document.getElementById('replay-content-layout').classList.remove('hidden');

    currentMovePointer = 0;
    renderReplayBoard();

    // ── แก้ไข: ส่ง gameData เข้าไปใน updateMoveList เพื่อรู้ว่าเกมจบด้วย checkmate หรือไม่ ──
    updateMoveList(gameData);

  } catch(err) {
    console.error(err);
    const loadingBox = document.getElementById('loading-box');
    if (loadingBox) loadingBox.textContent = "❌ เกิดข้อผิดพลาดทางเทคนิคในการประมวลผลกระดานรีเพลย์";
  }
}

// ฟังก์ชันแปลงชื่อหมาก
function getPieceName(p) {
  const names = {'K':'ข','Q':'ม็','B':'ค','N':'ม','R':'ร','P':'บ'};
  return p ? names[p[0]] : '';
}

// ฟังก์ชันแปลงตำแหน่ง (0-7 เป็น ก-ข)
function getPosName(r, c) {
  const cols = ['ก','ข','ค','ง','จ','ฉ','ช','ญ'];
  const rows = ['8','7','6','5','4','3','2','1'];
  return cols[c] + rows[r];
}

// ค้นหากษัตริย์ของฝ่าย
function findKing(board, color) {
  const king = `K${color}`;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      if (board[r][c] === king) return { r, c };
    }
  }
  return null;
}

// ตรวจสอบว่ากำลังรุกกษัตริย์ (check)
function isKingUnderAttack(board, kingPos, enemyColor) {
  if (!kingPos) return false;
  
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = board[r][c];
      if (!piece || !piece.includes(enemyColor)) continue;
      
      if (canPieceAttack(board, r, c, kingPos.r, kingPos.c, piece[0])) {
        return true;
      }
    }
  }
  return false;
}

// ตรวจสอบว่าหมากตัวหนึ่งสามารถโจมตีตำแหน่งได้หรือไม่
function canPieceAttack(board, fromR, fromC, toR, toC, type) {
  const piece = board[fromR][fromC];
  if (!piece) return false;
  
  const dr = toR - fromR;
  const dc = toC - fromC;
  
  switch(type) {
    case 'P': // บ (เบี้ย)
      const dir = piece.includes('w') ? -1 : 1;
      return dr === dir && Math.abs(dc) === 1;
    
    case 'N': // ม (ม้า)
      return (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
    
    case 'B': // ค (ควบ - ทแยง)
      if (Math.abs(dr) !== Math.abs(dc)) return false;
      return isPathClear(board, fromR, fromC, toR, toC);
    
    case 'R': // ร (เรือ - ตรง)
      if (dr !== 0 && dc !== 0) return false;
      return isPathClear(board, fromR, fromC, toR, toC);
    
    case 'Q': // ม็ (มัฒฌาห์ - ทแยง 1 ตัว)
      return Math.abs(dr) === 1 && Math.abs(dc) === 1;
    
    case 'K': // ข (ขุน - ทุกทิศ 1 ตัว)
      return Math.abs(dr) <= 1 && Math.abs(dc) <= 1;
    
    default:
      return false;
  }
}

// ตรวจสอบเส้นทางระหว่างสองช่อง (ไม่มีหมากกั้น)
function isPathClear(board, fromR, fromC, toR, toC) {
  const dr = toR > fromR ? 1 : toR < fromR ? -1 : 0;
  const dc = toC > fromC ? 1 : toC < fromC ? -1 : 0;
  
  let r = fromR + dr;
  let c = fromC + dc;
  
  while (r !== toR || c !== toC) {
    if (board[r][c]) return false;
    r += dr;
    c += dc;
  }
  
  return true;
}

function formatMoveDesc(move) {
  if (!move) return '-';
  if (!move.from || !move.to) return '-';

  let notation = (typeof move.desc === 'string' && move.desc.trim().length > 0)
    ? move.desc.trim().replace(/[+#]$/, '')
    : (() => {
      const board = move.board ? fbToBoard(move.board) : null;
      const piece = board?.[move.to.row]?.[move.to.col] || null;
      const pieceName = getPieceName(piece);
      return `${pieceName},${getPosName(move.from.row, move.from.col)}-${getPosName(move.to.row, move.to.col)}`;
    })();

  // ── ตรวจสอบ + (รุก) จากสถานะบอร์ดหลังตาเดินนี้ ──
  const board = move.board ? fbToBoard(move.board) : null;
  const piece = board?.[move.to.row]?.[move.to.col] || null;
  if (board && piece) {
    const enemyColor = piece.includes('w') ? 'b' : 'w';
    const kingPos = findKing(board, enemyColor);
    if (isKingUnderAttack(board, kingPos, enemyColor === 'w' ? 'b' : 'w')) {
      notation += '+';
    }
  }

  return notation;
}

// ── แก้ไข: รับ gameData เพื่อตรวจว่าเกมจบด้วย checkmate หรือไม่ ──
function updateMoveList(gameData) {
  const body = document.getElementById('move-list-body');
  body.innerHTML = "";

  const lastMoveIndex = loadedMoves.length - 1; // index ของตาเดินสุดท้ายใน array
  const isCheckmateGame = gameData?.finalReason === 'checkmate';

  // จัดกลุ่มข้อมูลตาเดินเป็นคู่ (ขาว-ดำ)
  for (let i = 1; i < loadedMoves.length; i += 2) {
    const row = document.createElement('div');
    row.className = 'move-row';
    const whiteMove = loadedMoves[i];
    const blackMove = loadedMoves[i + 1];

    let whiteNotation = formatMoveDesc(whiteMove);
    let blackNotation = formatMoveDesc(blackMove);

    // ── แก้ไข: ถ้าเกมจบด้วย checkmate ให้แทนที่ + ด้วย # เฉพาะตาสุดท้าย ──
    if (isCheckmateGame) {
      if (i === lastMoveIndex) {
        // ตาสุดท้ายเป็นฝ่ายขาว
        whiteNotation = whiteNotation.replace(/[+#]$/, '') + '#';
      } else if (blackMove && (i + 1) === lastMoveIndex) {
        // ตาสุดท้ายเป็นฝ่ายดำ
        blackNotation = blackNotation.replace(/[+#]$/, '') + '#';
      }
    }

    row.innerHTML = `
      <span>${Math.ceil(i / 2)}.</span>
      <span>${whiteNotation}</span>
      <span>${blackNotation}</span>
    `;
    body.appendChild(row);
  }
}

// ─── ฟังก์ชันเรนเดอร์สีกระดานและตัวหมากตาม Pointer ตาเดินปัจจุบัน ───
function renderReplayBoard() {
  const boardContainer = document.getElementById('replay-chess-board');
  boardContainer.innerHTML = "";

  const currentMove = loadedMoves[currentMovePointer];
  const activeBoard = fbToBoard(currentMove.board);

  // ควบคุมทิศทางมุมมองกระดาน (กลับด้านหมากดำ/ขาว)
  const rowOrder = replayFlipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
  const colOrder = replayFlipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];

  rowOrder.forEach(row => {
    colOrder.forEach(col => {
      const cell = document.createElement('div');
      cell.className = `chess-cell ${(row+col)%2===0?'light':'dark'}`;
      
      const piece = activeBoard[row][col];
      if (piece) {
        const img = document.createElement('img');
        img.className = 'piece-img';
        img.src = `../Pieces/${piece}.png`;
        cell.appendChild(img);
      }
      boardContainer.appendChild(cell);
    });
  });

  // สลับสถานะปุ่มกดล็อกเมื่อสุดขอบตาเดิน
  document.getElementById('btn-first').disabled = (currentMovePointer === 0);
  document.getElementById('btn-prev').disabled  = (currentMovePointer === 0);
  document.getElementById('btn-next').disabled  = (currentMovePointer === loadedMoves.length - 1);
  document.getElementById('btn-last').disabled  = (currentMovePointer === loadedMoves.length - 1);
}

// ─── เหตุการณ์เมื่อคลิกปุ่มคอนโทรลควบคุม ───
document.getElementById('btn-first').onclick = () => { currentMovePointer = 0; renderReplayBoard(); };
document.getElementById('btn-prev').onclick  = () => { if (currentMovePointer > 0) { currentMovePointer--; renderReplayBoard(); } };
document.getElementById('btn-next').onclick  = () => { if (currentMovePointer < loadedMoves.length - 1) { currentMovePointer++; renderReplayBoard(); } };
document.getElementById('btn-last').onclick  = () => { currentMovePointer = loadedMoves.length - 1; renderReplayBoard(); };

// ปุ่มกดพาย้อนกลับไปยังหน้าจอแก้ไขโปรไฟล์
document.getElementById('btn-back-to-profile').onclick = () => {
  window.location.href = 'profile.html';
};

// เริ่มรันระบบทันทีที่เปิดหน้านี้
initReplayPage();
</script>
</body>
</html>

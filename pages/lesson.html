<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUKTHAI - บทเรียน</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../styles-friend-enhanced.css">
<link rel="stylesheet" href="../theme-refresh.css">
<link rel="stylesheet" href="../mobile.css" media="screen and (max-width: 900px)">
<script type="module" src="../auth.js"></script>
<style>
  .lesson-body .main { height: auto; min-height: calc(100vh - 60px); display: block; align-items: initial; justify-content: initial; }
  .lesson-wrap { max-width: 1180px; margin: 0 auto; padding: 22px 16px 80px; }
  .lesson-back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.9rem; margin-bottom: 16px; cursor: pointer; }
  .lesson-back:hover { color: var(--gold); }
  .lesson-head { margin-bottom: 18px; }
  .lesson-head h1 { font-size: 1.5rem; margin: 0 0 6px; }
  .lesson-head .meta { color: var(--muted); font-size: 0.85rem; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .lesson-cat-badge { background: var(--gold-soft); color: var(--gold); padding: 2px 9px; border-radius: 6px; font-weight: 600; }

  .lesson-layout { display: grid; grid-template-columns: minmax(0,1fr) 340px; gap: 28px; align-items: start; }
  @media (max-width: 820px) { .lesson-layout { grid-template-columns: 1fr; } }
  .lesson-board-col { max-width: 680px; }

  /* กระดาน (ยึด game.css) */
  .lb-layout { display: grid; grid-template-columns: 20px 1fr; grid-template-rows: auto 20px; gap: 5px; width: 100%; }
  .lb-coords-left { grid-column: 1; grid-row: 1; display: grid; grid-template-rows: repeat(8,1fr); align-items: center; justify-items: center; }
  .lb-coords-bottom { grid-column: 2; grid-row: 2; display: grid; grid-template-columns: repeat(8,1fr); align-items: center; justify-items: center; }
  .lb-coords-left span, .lb-coords-bottom span { font-size: 0.8rem; color: var(--muted); font-family: var(--font-mono, monospace); }
  .lb-board { grid-column: 2; grid-row: 1; display: grid; grid-template-columns: repeat(8, minmax(0,1fr)); gap: 2px; background: #1e1d1b; border-radius: 6px; overflow: hidden; }
  .lb-cell { position: relative; aspect-ratio: 1; min-width: 0; background: #c56c30; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .lb-cell img { width: 82%; height: 82%; object-fit: contain; pointer-events: none; user-select: none; }
  .lb-cell.sel { background: rgba(168,168,168,0.45); }
  .lb-cell.last { background: rgba(207,126,21,0.79); }
  .lb-cell.legal::after { content: ''; position: absolute; width: 30%; height: 30%; background: rgba(131,131,131,0.77); border-radius: 50%; pointer-events: none; }
  .lb-cell.cap { outline: 3px solid rgba(239,100,68,0.7); outline-offset: -3px; }

  .lesson-controls { display: flex; gap: 8px; margin-top: 12px; }
  .lesson-controls button { flex: 1; height: 42px; border-radius: 10px; border: 1px solid var(--border-strong, rgba(255,255,255,0.12)); background: transparent; color: var(--text); cursor: pointer; font-family: var(--font-ui,'Noto Sans Thai',sans-serif); font-weight: 700; font-size: 1rem; }
  .lesson-controls button:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-soft); }
  .lesson-controls button:disabled { opacity: 0.4; cursor: default; }
  .lesson-progress { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 10px; }

  .lesson-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg,16px); padding: 20px 22px; box-shadow: var(--shadow-1); }
  .lesson-panel .step-move { font-family: var(--font-mono,monospace); color: var(--gold); font-weight: 600; margin-bottom: 8px; }
  .lesson-panel .step-text { color: var(--text); font-size: 1rem; line-height: 1.7; white-space: pre-wrap; }
  .lesson-panel .step-empty { color: var(--muted); font-style: italic; }
  .lesson-hint { margin-top: 14px; padding: 10px 12px; border-radius: 10px; font-size: 0.86rem; background: var(--gold-soft); color: var(--gold); display: none; }
  .lesson-hint.show { display: block; }
  .lesson-hint.wrong { background: rgba(197,84,74,0.12); color: #e0796f; }
  .admin-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .admin-bar button { height: 36px; padding: 0 14px; border-radius: 8px; border: 1px solid var(--border-strong, rgba(255,255,255,0.12)); background: transparent; color: var(--text); cursor: pointer; font-family: var(--font-ui,'Noto Sans Thai',sans-serif); font-weight: 600; font-size: 0.83rem; }
  .admin-bar .del:hover { border-color: #c5544a; color: #e0796f; background: rgba(197,84,74,0.08); }
  .lesson-loading, .lesson-missing { text-align: center; color: var(--muted); padding: 70px 0; }
</style>
</head>
<body class="lesson-body">
<header class="topbar">
    <div class="left">
        <a href="play.html" class="logo">
            <div class="logo-icon">
                <img class="logo-dark" src="/Images/DarkLOGO.png" alt="RUKTHAI logo dark">
                <img class="logo-light" src="/Images/LightLOGO.png" alt="RUKTHAI logo light">
            </div>
        </a>
        <nav class="nav">
            <a href="play.html">เล่น</a>
            <a href="tournament.html">ทัวร์นาเมนต์</a>
            <a href="learn.html">เรียนรู้</a>
            <a href="watch.html">ดูเกม</a>
            <a href="community.html">ชุมชน</a>
            <input class="search" placeholder="ค้นหาผู้เล่น...">
        </nav>
    </div>
    <div class="right">
        <button class="register">ลงทะเบียน</button>
        <button class="login">เข้าสู่ระบบ</button>
    </div>
</header>

<main class="main">
  <div class="lesson-wrap">
    <div class="lesson-back" onclick="location.href='learn.html#lessons'">← กลับไปบทเรียน</div>
    <div id="lesson-content"><div class="lesson-loading">กำลังโหลด…</div></div>
  </div>
</main>

<script src="../game.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJjQsqiJsbJW0pwlI0fqnklRhKFPSJh_w",
  authDomain: "rukthai-b4971.firebaseapp.com",
  databaseURL: "https://rukthai-b4971-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rukthai-b4971",
  storageBucket: "rukthai-b4971.firebasestorage.app",
  messagingSenderId: "140554271105",
  appId: "1:140554271105:web:00530dbfb7b8c4aed1d080"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const E = window;

const ADMIN_EMAILS = ['wachangngoen95@gmail.com'];
const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
function loadUser() { try { return JSON.parse(localStorage.getItem('rukthai_current_user')) || null; } catch (e) { return null; } }
const currentUser = loadUser();
const isAdmin = !!(currentUser && currentUser.email && ADMIN_EMAILS.includes(currentUser.email.toLowerCase()));
const CAT_LABEL = { rules: 'การเดินหมากและกติกา', opening: 'การเปิดเกม', midgame: 'กลางเกม', endgame: 'การไล่ปลายกระดาน' };

const lessonId = new URLSearchParams(location.search).get('id');
let lesson = null, steps = [], stepIndex = 0, sel = null, selLegal = [];

// แปลง startBoard (แถวสตริง) -> อาเรย์ 2 มิติ
function parseStartBoard(fb) {
  if (!Array.isArray(fb) || fb.length !== 8) return E.cloneBoard(E.INITIAL_BOARD);
  return fb.map(row => String(row).split(',').map(x => x || null));
}

// สร้างกระดาน ณ ขั้นที่กำหนด (replay)
function boardAt(n) {
  let b = lesson && lesson.startBoard ? parseStartBoard(lesson.startBoard) : E.cloneBoard(E.INITIAL_BOARD);
  for (let i = 0; i < n; i++) {
    const s = steps[i];
    const piece = b[s.from[0]][s.from[1]];
    b[s.to[0]][s.to[1]] = E.promoteIfNeeded(piece, s.to[0]);
    b[s.from[0]][s.from[1]] = null;
  }
  return b;
}

function renderBoardEl(board, lastMove) {
  const el = document.getElementById('lb-board');
  if (!el) return;
  let html = '';
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const p = board[r][c];
    const isLast = lastMove && ((lastMove.from[0] === r && lastMove.from[1] === c) || (lastMove.to[0] === r && lastMove.to[1] === c));
    const isSel = sel && sel.r === r && sel.c === c;
    const legal = selLegal.find(m => m.to.row === r && m.to.col === c);
    const cls = [isLast ? 'last' : '', isSel ? 'sel' : '', legal ? (p ? 'cap' : 'legal') : ''].filter(Boolean).join(' ');
    html += `<div class="lb-cell ${cls}" data-r="${r}" data-c="${c}">${p ? `<img src="../Pieces/${p}.png" alt="">` : ''}</div>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('.lb-cell').forEach(cell => cell.addEventListener('click', () => onCell(+cell.dataset.r, +cell.dataset.c)));
}

function update() {
  const board = boardAt(stepIndex);
  const lastMove = stepIndex > 0 ? steps[stepIndex - 1] : null;
  renderBoardEl(board, lastMove);
  // แผงคำอธิบาย
  const panel = document.getElementById('step-panel');
  if (panel) {
    if (stepIndex === 0) {
      panel.innerHTML = `<div class="step-text step-empty">เริ่มบทเรียน — กด "ถัดไป" เพื่อดูการเดิน หรือลองเล่นตาเดินที่ถูกต้องบนกระดานเอง</div>`;
    } else {
      const s = steps[stepIndex - 1];
      const mv = `${E.getPosName(s.from[0], s.from[1])} → ${E.getPosName(s.to[0], s.to[1])}`;
      panel.innerHTML = `<div class="step-move">ขั้นที่ ${stepIndex}: ${esc(mv)}</div><div class="step-text">${esc(s.text) || '<span class="step-empty">— ไม่มีคำอธิบาย —</span>'}</div>`;
    }
  }
  document.getElementById('lesson-progress').textContent = `ขั้น ${stepIndex} / ${steps.length}`;
  document.getElementById('btn-first').disabled = stepIndex === 0;
  document.getElementById('btn-prev').disabled = stepIndex === 0;
  document.getElementById('btn-next').disabled = stepIndex >= steps.length;
  document.getElementById('btn-last').disabled = stepIndex >= steps.length;
}

function showHint(text, wrong) {
  const h = document.getElementById('lesson-hint');
  if (!h) return;
  h.textContent = text; h.className = 'lesson-hint show' + (wrong ? ' wrong' : '');
  clearTimeout(showHint._t); showHint._t = setTimeout(() => { h.className = 'lesson-hint'; }, 2200);
}

function onCell(r, c) {
  const board = boardAt(stepIndex);
  const expected = steps[stepIndex];
  if (sel) {
    const legal = selLegal.find(m => m.to.row === r && m.to.col === c);
    if (legal) {
      if (expected && sel.r === expected.from[0] && sel.c === expected.from[1] && r === expected.to[0] && c === expected.to[1]) {
        stepIndex++; sel = null; selLegal = []; update();
        showHint('ถูกต้อง! ✓', false);
      } else {
        sel = null; selLegal = []; update();
        showHint('ยังไม่ใช่ตาเดินของบทเรียนนี้ ลองอีกครั้ง', true);
      }
      return;
    }
  }
  const p = board[r][c];
  if (p) { sel = { r, c }; selLegal = E.getLegalMoves(board, r, c); }
  else { sel = null; selLegal = []; }
  renderBoardEl(board, stepIndex > 0 ? steps[stepIndex - 1] : null);
}

function render(l) {
  const wrap = document.getElementById('lesson-content');
  if (!l) { wrap.innerHTML = '<div class="lesson-missing">ไม่พบบทเรียนนี้ (อาจถูกลบไปแล้ว)</div>'; return; }
  lesson = l; steps = l.steps || []; stepIndex = 0; sel = null; selLegal = [];
  const adminBar = isAdmin ? `<div class="admin-bar"><button class="del" id="btn-del-lesson">🗑 ลบบทเรียน</button></div>` : '';
  wrap.innerHTML = `
    ${adminBar}
    <div class="lesson-head">
      <h1>${esc(l.title || 'บทเรียน')}</h1>
      <div class="meta"><span class="lesson-cat-badge">${esc(CAT_LABEL[l.category] || 'บทเรียน')}</span><span>·</span><span>${esc(l.authorName || 'ทีมงาน')}</span><span>·</span><span>${steps.length} ขั้น</span></div>
    </div>
    <div class="lesson-layout">
      <div class="lesson-board-col">
        <div class="lb-layout">
          <div class="lb-coords-left"><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span></div>
          <div class="lb-board" id="lb-board"></div>
          <div class="lb-coords-bottom"><span>ก</span><span>ข</span><span>ค</span><span>ง</span><span>จ</span><span>ฉ</span><span>ช</span><span>ซ</span></div>
        </div>
        <div class="lesson-controls">
          <button id="btn-first" title="ขั้นแรก">⏮</button>
          <button id="btn-prev" title="ก่อนหน้า">◀</button>
          <button id="btn-next" title="ถัดไป">▶</button>
          <button id="btn-last" title="ขั้นสุดท้าย">⏭</button>
        </div>
        <div class="lesson-progress" id="lesson-progress"></div>
      </div>
      <div>
        <div class="lesson-panel"><div id="step-panel"></div></div>
        <div class="lesson-hint" id="lesson-hint"></div>
      </div>
    </div>`;

  document.getElementById('btn-first').addEventListener('click', () => { stepIndex = 0; sel = null; selLegal = []; update(); });
  document.getElementById('btn-prev').addEventListener('click', () => { if (stepIndex > 0) stepIndex--; sel = null; selLegal = []; update(); });
  document.getElementById('btn-next').addEventListener('click', () => { if (stepIndex < steps.length) stepIndex++; sel = null; selLegal = []; update(); });
  document.getElementById('btn-last').addEventListener('click', () => { stepIndex = steps.length; sel = null; selLegal = []; update(); });
  const del = document.getElementById('btn-del-lesson');
  if (del) del.addEventListener('click', async () => {
    if (!confirm('ลบบทเรียนนี้ถาวร?')) return;
    try { await remove(ref(db, `lessons/${lessonId}`)); location.href = 'learn.html#lessons'; }
    catch (e) { alert('ลบไม่สำเร็จ'); }
  });
  update();
}

if (!lessonId) {
  document.getElementById('lesson-content').innerHTML = '<div class="lesson-missing">ไม่พบรหัสบทเรียน</div>';
} else {
  onValue(ref(db, `lessons/${lessonId}`), (snap) => render(snap.val()),
    (err) => { document.getElementById('lesson-content').innerHTML = `<div class="lesson-missing">โหลดบทเรียนไม่ได้: ${esc(err.code || err.message)}</div>`; });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUKTHAI - ซุ้ม</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../styles-friend-enhanced.css">
<link rel="stylesheet" href="../theme-refresh.css">
<link rel="stylesheet" href="../mobile.css" media="screen and (max-width: 900px)">
<script type="module" src="../auth.js"></script>
<style>
  .club-body .main { height: auto; min-height: calc(100vh - 60px); display: block; align-items: initial; justify-content: initial; }
  .club-wrap { max-width: 880px; margin: 0 auto; padding: 20px 16px 80px; }
  .club-back { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.9rem; margin-bottom: 14px; cursor: pointer; }
  .club-back:hover { color: var(--gold); }

  .club-hero {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg, 16px);
    overflow: hidden; box-shadow: var(--shadow-1); margin-bottom: 20px;
  }
  .club-hero-banner { aspect-ratio: 1920 / 600; height: auto; min-height: 150px; max-height: 320px; background: linear-gradient(135deg,#7a5230,#c8a24a); background-size: cover; background-position: center; }
  .club-hero-body { padding: 0 22px 22px; display: flex; gap: 16px; align-items: flex-end; }
  .club-hero-logo {
    width: 88px; height: 88px; border-radius: 16px; border: 4px solid var(--bg2); margin-top: -44px;
    background: var(--surface); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 800; color: var(--gold);
  }
  .club-hero-logo img { width: 100%; height: 100%; object-fit: cover; }
  .club-hero-info { flex: 1; min-width: 0; padding-top: 12px; }
  .club-hero-info h1 { margin: 0 0 6px; font-size: 1.5rem; }
  .club-hero-meta { display: flex; gap: 10px; align-items: center; color: var(--muted); font-size: 0.82rem; flex-wrap: wrap; }
  .club-badge { background: var(--gold-soft); color: var(--gold); padding: 2px 9px; border-radius: 6px; font-weight: 600; }
  .club-hero-action { padding-top: 12px; }
  .club-action-btn {
    height: 42px; padding: 0 22px; border-radius: var(--r-md,12px); font-weight: 700; cursor: pointer;
    font-family: var(--font-ui,'Noto Sans Thai',sans-serif); font-size: 0.92rem; border: 1px solid var(--border-strong, rgba(255,255,255,0.12)); background: transparent; color: var(--text);
  }
  .club-action-btn.primary { background: var(--gold); color: #1a1305; border-color: var(--gold); }
  .club-action-btn.primary:hover { background: var(--gold-light,#e3c479); }
  .club-action-btn.danger:hover { border-color: #c5544a; color: #e0796f; background: rgba(197,84,74,0.08); }
  .club-action-btn.disabled { opacity: 0.55; cursor: default; }

  .club-desc-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg,16px); padding: 18px 20px; margin-bottom: 20px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }

  .club-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg,16px); padding: 18px 20px; margin-bottom: 18px; }
  .club-section h2 { font-size: 1.05rem; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }
  .club-section h2 .count { color: var(--muted); font-weight: 500; font-size: 0.85rem; }

  .member-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .member-row:last-child { border-bottom: none; }
  .member-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; cursor: pointer;
    background: linear-gradient(135deg,#7a5230,#c8a24a); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; }
  .member-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .member-name { font-weight: 600; color: var(--text); cursor: pointer; }
  .member-name:hover { color: var(--gold); text-decoration: underline; }
  .role-badge { font-size: 0.72rem; padding: 2px 8px; border-radius: 6px; font-weight: 600; margin-left: 8px; }
  .role-owner { background: rgba(212,175,85,0.18); color: var(--gold); }
  .role-admin { background: rgba(120,160,255,0.15); color: #8fb0ff; }
  .role-member { background: var(--border); color: var(--muted); }
  .req-note { color: var(--muted); font-size: 0.82rem; font-style: italic; margin-top: 6px; }
  .member-actions { display: flex; gap: 6px; margin-left: auto; }
  .mini-btn {
    height: 30px; padding: 0 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border-strong, rgba(255,255,255,0.12)); background: transparent; color: var(--text);
    font-family: var(--font-ui, 'Noto Sans Thai', sans-serif); transition: background 0.15s, border-color 0.15s;
  }
  .mini-btn.accept { background: var(--gold); color: #1a1305; border-color: var(--gold); }
  .mini-btn.accept:hover { background: var(--gold-light, #e3c479); }
  .mini-btn.reject:hover, .mini-btn.kick:hover { border-color: #c5544a; color: #e0796f; background: rgba(197,84,74,0.08); }
  .club-delete-bar { margin-top: 8px; text-align: right; }
  .btn-delete-club {
    background: transparent; border: 1px solid rgba(197,84,74,0.5); color: #e0796f; height: 40px; padding: 0 18px;
    border-radius: 10px; font-weight: 600; cursor: pointer; font-family: var(--font-ui, 'Noto Sans Thai', sans-serif);
  }
  .btn-delete-club:hover { background: rgba(197,84,74,0.12); }
  .mini-btn.promote:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-soft); }
  .invite-box { display: flex; gap: 8px; }
  .invite-box input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px;
    color: var(--text); font-family: var(--font-mono, monospace); font-size: 0.8rem;
  }
  .invite-box input:focus { outline: none; border-color: var(--gold); }
  .invite-banner {
    background: var(--gold-soft); border: 1px solid var(--gold); color: var(--gold);
    border-radius: var(--r-md, 12px); padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; font-weight: 600;
  }
  .btn-edit-club {
    background: transparent; border: 1px solid var(--border-strong, rgba(255,255,255,0.12)); color: var(--text);
    height: 42px; padding: 0 16px; border-radius: var(--r-md,12px); font-weight: 600; cursor: pointer;
    font-family: var(--font-ui,'Noto Sans Thai',sans-serif); margin-right: 8px;
  }
  .btn-edit-club:hover { border-color: var(--gold); background: var(--gold-soft); }
  .edit-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; padding: 20px; }
  .edit-overlay.open { display: flex; }
  .edit-modal { background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-lg,16px); width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto; padding: 22px; box-shadow: var(--shadow-2); }
  .edit-modal h2 { margin: 0 0 16px; font-size: 1.2rem; }
  .edit-field { margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
  .edit-field label { font-size: 0.85rem; font-weight: 600; }
  .edit-field input[type="text"], .edit-field textarea { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-family: var(--font-ui,'Noto Sans Thai',sans-serif); font-size: 0.92rem; }
  .edit-field textarea { resize: vertical; min-height: 70px; }
  .edit-img-row { display: flex; align-items: center; gap: 10px; }
  .edit-img-preview { background: var(--surface); background-size: cover; background-position: center; border: 1px solid var(--border); flex-shrink: 0; }
  .edit-actions { display: flex; gap: 10px; margin-top: 8px; }
  .edit-actions button { flex: 1; height: 44px; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: var(--font-ui,'Noto Sans Thai',sans-serif); }
  .edit-cancel { background: transparent; border: 1px solid var(--border-strong, rgba(255,255,255,0.12)); color: var(--text); }
  .edit-save { background: var(--gold); border: none; color: #1a1305; }
  .edit-save:hover { background: var(--gold-light,#e3c479); }
  .edit-msg { font-size: 0.82rem; color: var(--muted); min-height: 18px; margin-top: 6px; }
  .club-loading, .club-missing { text-align: center; color: var(--muted); padding: 60px 0; }

  /* ── 2 คอลัมน์: ข้อมูล (ซ้าย) + แชท (ขวา) ── */
  .club-grid { display: grid; grid-template-columns: 1fr; gap: 18px; align-items: start; }
  .club-grid.has-chat { grid-template-columns: 1fr 340px; }
  @media (max-width: 860px) { .club-grid.has-chat { grid-template-columns: 1fr; } }

  .club-chat-col { position: sticky; top: 76px; }
  @media (max-width: 860px) { .club-chat-col { position: static; } }
  .club-chat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-lg,16px); display: flex; flex-direction: column; height: calc(100vh - 120px); min-height: 420px; max-height: 720px; overflow: hidden; box-shadow: var(--shadow-1); }
  .ccl-head { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .ccl-head h2 { margin: 0; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
  .ccl-note { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .ccl-stream { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
  .ccl-msg { display: flex; gap: 9px; align-items: flex-start; }
  .ccl-av { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; overflow: hidden; cursor: pointer; background: linear-gradient(135deg,#7a5230,#c8a24a); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.8rem; }
  .ccl-av img { width: 100%; height: 100%; object-fit: cover; }
  .ccl-b { min-width: 0; flex: 1; }
  .ccl-meta { display: flex; gap: 7px; align-items: baseline; }
  .ccl-name { font-weight: 600; font-size: 0.84rem; color: var(--text); cursor: pointer; }
  .ccl-name:hover { color: var(--gold); text-decoration: underline; }
  .ccl-time { font-size: 0.68rem; color: var(--muted); }
  .ccl-text { font-size: 0.86rem; color: var(--text); line-height: 1.45; word-break: break-word; white-space: pre-wrap; }
  .chat-link { color: var(--gold); text-decoration: underline; word-break: break-all; }
  .chat-link:hover { color: var(--gold-light, #e3c479); }
  .ccl-empty { margin: auto; color: var(--muted); font-style: italic; text-align: center; font-size: 0.85rem; }
  .ccl-input { display: flex; gap: 7px; padding: 10px; border-top: 1px solid var(--border); }
  .ccl-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; color: var(--text); font-family: var(--font-ui,'Noto Sans Thai',sans-serif); font-size: 0.88rem; }
  .ccl-input input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-soft); }
  .ccl-input button { background: var(--gold); color: #1a1305; border: none; border-radius: 10px; padding: 0 16px; font-weight: 700; cursor: pointer; font-family: var(--font-ui,'Noto Sans Thai',sans-serif); }
  .ccl-input button:hover { background: var(--gold-light,#e3c479); }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, remove, get, push, query, orderByChild, limitToLast, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCJjQsqiJsbJW0pwlI0fqnklRhKFPSJh_w",
  authDomain: "rukthai-b4971.firebaseapp.com",
  databaseURL: "https://rukthai-b4971-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rukthai-b4971",
  storageBucket: "rukthai-b4971.firebasestorage.app",
  messagingSenderId: "140554271105",
  appId: "1:140554271105:web:00530dbfb7b8c4aed1d080"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const safeId = (id) => id ? String(id).replace(/[.#$\[\]]/g, '_') : '';
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function loadUser() { try { return JSON.parse(localStorage.getItem('rukthai_current_user')) || null; } catch (e) { return null; } }
const currentUser = loadUser();
const mySid = currentUser && currentUser.id ? safeId(currentUser.id) : null;
const myName = currentUser ? (currentUser.name || currentUser.email || 'ผู้เล่น') : '';

const clubId = new URLSearchParams(location.search).get('id');
let usersMap = {};

const ROLE_ORDER = { owner: 0, admin: 1, member: 2 };
const ROLE_LABEL = { owner: '👑 เจ้าของ', admin: '⭐ แอดมิน', member: 'สมาชิก' };
let currentClub = null;
function fmtDate(ts) { if (!ts) return ''; return new Date(ts).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }); }
function avatarOf(uid, name) { const u = usersMap[safeId(uid)]; const a = u && u.avatar ? u.avatar : ''; return a ? `<img src="${esc(a)}" alt="">` : esc(String(name || '?').charAt(0).toUpperCase()); }
function nameOf(uid, fb) { const u = usersMap[safeId(uid)]; return (u && u.name && u.name.trim()) ? u.name : (fb || 'ผู้เล่น'); }

function render(c) {
  const content = document.getElementById('club-content');
  if (!c) { content.innerHTML = '<div class="club-missing">ไม่พบซุ้มนี้ (อาจถูกลบไปแล้ว)</div>'; return; }
  currentClub = c;

  const members = c.members || {};
  const memberCount = Object.keys(members).length;
  const requests = c.requests || {};
  const reqCount = Object.keys(requests).length;
  const myRole = mySid && members[mySid] ? members[mySid].role : null;
  const isManager = myRole === 'owner' || myRole === 'admin';
  const requested = !!(mySid && requests[mySid]);
  // เตะได้ไหม: เจ้าของเตะได้ทุกคนยกเว้นตัวเอง/เจ้าของ, แอดมินเตะได้เฉพาะสมาชิก
  const canKick = (role, sid) => {
    if (sid === mySid) return false;
    if (myRole === 'owner') return role !== 'owner';
    if (myRole === 'admin') return role === 'member';
    return false;
  };
  const badge = c.joinType === 'open' ? 'เข้าได้เลย' : 'ต้องอนุมัติ';
  const lg = c.logo || c.image || '', cv = c.cover || c.image || '';
  const logo = lg ? `<img src="${esc(lg)}" alt="">` : esc(String(c.name || '?').charAt(0).toUpperCase());
  const banner = cv ? `style="background-image:url('${esc(cv)}')"` : '';

  // ลิงก์เชิญ
  const inviteParam = new URLSearchParams(location.search).get('invite');
  const validInvite = !!(inviteParam && c.inviteToken && inviteParam === c.inviteToken);

  // ปุ่ม action
  let action = '';
  if (!mySid) action = `<button class="club-action-btn disabled" disabled>เข้าสู่ระบบเพื่อเข้าร่วม</button>`;
  else if (myRole === 'owner') action = `<button class="club-action-btn disabled" disabled>👑 คุณเป็นเจ้าของ</button>`;
  else if (myRole) action = `<button class="club-action-btn danger" id="btn-leave">ออกจากซุ้ม</button>`;
  else if (validInvite) action = `<button class="club-action-btn primary" id="btn-invite-join">✉️ เข้าร่วมด้วยลิงก์เชิญ</button>`;
  else if (requested) action = `<button class="club-action-btn" id="btn-cancel">ยกเลิกคำขอ</button>`;
  else if (c.joinType === 'open') action = `<button class="club-action-btn primary" id="btn-join">เข้าร่วม</button>`;
  else action = `<button class="club-action-btn primary" id="btn-request">ขอเข้าร่วม</button>`;

  // ปุ่มจัดการสมาชิก: เจ้าของ = ตั้ง/ลดแอดมิน, โอนเจ้าของ, เตะ | แอดมิน = เตะสมาชิก
  function manageButtons(sid, role) {
    if (myRole !== 'owner') {
      return canKick(role, sid) ? `<button class="mini-btn kick" data-kick="${esc(sid)}">เตะ</button>` : '';
    }
    if (sid === mySid) return '';
    let b = '';
    if (role === 'member') b += `<button class="mini-btn promote" data-promote="${esc(sid)}">⭐ แอดมิน</button>`;
    else if (role === 'admin') b += `<button class="mini-btn" data-demote="${esc(sid)}">↓ สมาชิก</button>`;
    b += `<button class="mini-btn" data-transfer="${esc(sid)}">โอนเจ้าของ</button>`;
    b += `<button class="mini-btn kick" data-kick="${esc(sid)}">เตะ</button>`;
    return b;
  }
  const sorted = Object.entries(members).sort((a, b) =>
    (ROLE_ORDER[a[1].role] ?? 9) - (ROLE_ORDER[b[1].role] ?? 9) || (a[1].joinedAt || 0) - (b[1].joinedAt || 0));
  const memberRows = sorted.map(([sid, m]) => {
    const btns = manageButtons(sid, m.role);
    return `
    <div class="member-row">
      <div class="member-avatar" data-uid="${esc(sid)}">${avatarOf(sid, m.name)}</div>
      <div style="flex:1; min-width:0;">
        <span class="member-name" data-uid="${esc(sid)}">${esc(nameOf(sid, m.name))}</span>
        <span class="role-badge role-${esc(m.role)}">${ROLE_LABEL[m.role] || 'สมาชิก'}</span>
      </div>
      ${btns ? `<div class="member-actions">${btns}</div>` : ''}
    </div>`;
  }).join('');

  // คำขอเข้าร่วม (เจ้าของ/แอดมินจัดการได้)
  let requestsBlock = '';
  if (isManager && reqCount > 0) {
    const reqRows = Object.entries(requests).sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0)).map(([sid, r]) => `
      <div class="member-row">
        <div class="member-avatar" data-uid="${esc(sid)}">${avatarOf(sid, r.name)}</div>
        <div style="flex:1;"><span class="member-name" data-uid="${esc(sid)}">${esc(nameOf(sid, r.name))}</span>
          <span style="color:var(--muted); font-size:0.78rem; margin-left:8px;">${fmtDate(r.ts)}</span></div>
        <div class="member-actions">
          <button class="mini-btn accept" data-accept="${esc(sid)}">รับ</button>
          <button class="mini-btn reject" data-reject="${esc(sid)}">ปฏิเสธ</button>
        </div>
      </div>`).join('');
    requestsBlock = `
      <div class="club-section">
        <h2>⏳ คำขอเข้าร่วม <span class="count">(${reqCount})</span></h2>
        ${reqRows}
      </div>`;
  }

  content.innerHTML = `
    <div class="club-hero">
      <div class="club-hero-banner" ${banner}></div>
      <div class="club-hero-body">
        <div class="club-hero-logo">${logo}</div>
        <div class="club-hero-info">
          <h1>${esc(c.name || 'ซุ้ม')}</h1>
          <div class="club-hero-meta"><span class="club-badge">${badge}</span><span>👥 ${memberCount} สมาชิก</span><span>สร้างเมื่อ ${fmtDate(c.createdAt)}</span></div>
        </div>
        <div class="club-hero-action">${isManager ? `<button class="btn-edit-club" id="btn-edit-club">✎ แก้ไขซุ้ม</button>` : ''}${action}</div>
      </div>
    </div>
    ${validInvite && !myRole ? `<div class="invite-banner">✉️ คุณได้รับเชิญเข้าซุ้มนี้ — กด "เข้าร่วมด้วยลิงก์เชิญ" ด้านบน</div>` : ''}
    <div class="club-grid ${myRole ? 'has-chat' : ''}">
      <div class="club-main-col">
        ${c.description ? `<div class="club-desc-box">${esc(c.description)}</div>` : ''}
        ${isManager ? `
          <div class="club-section">
            <h2>🔗 เชิญสมาชิก</h2>
            <p style="color:var(--muted); font-size:0.85rem; margin:0 0 10px;">แชร์ลิงก์นี้เพื่อให้ผู้เล่นเข้าซุ้มได้ทันที (ข้ามการอนุมัติ)</p>
            <div class="invite-box">
              <input id="invite-link" readonly placeholder="กดปุ่มเพื่อสร้างลิงก์เชิญ" value="${c.inviteToken ? esc(inviteUrl(c.inviteToken)) : ''}">
              <button class="mini-btn accept" id="btn-invite">${c.inviteToken ? 'คัดลอกลิงก์' : 'สร้างลิงก์เชิญ'}</button>
            </div>
          </div>` : ''}
        ${requestsBlock}
        <div class="club-section">
          <h2>👥 สมาชิก <span class="count">(${memberCount})</span></h2>
          ${memberRows}
        </div>
        ${myRole === 'owner' ? `<div class="club-delete-bar"><button class="btn-delete-club" id="btn-delete-club">🗑 ลบซุ้มนี้</button></div>` : ''}
      </div>
      ${myRole ? `
        <div class="club-chat-col">
          <div class="club-chat-card">
            <div class="ccl-head"><h2>💬 แชทซุ้ม</h2><div class="ccl-note">🔒 เฉพาะสมาชิกในซุ้มเท่านั้น</div></div>
            <div class="ccl-stream" id="club-chat-stream"><div class="ccl-empty">กำลังโหลด…</div></div>
            <div class="ccl-input"><input id="club-chat-text" placeholder="พิมพ์ข้อความ…" maxlength="500" autocomplete="off"><button id="club-chat-send">ส่ง</button></div>
          </div>
        </div>` : ''}
    </div>`;

  // ผูก event
  content.querySelectorAll('[data-uid]').forEach(el => el.addEventListener('click', () => { if (el.dataset.uid) location.href = `profile.html?user=${encodeURIComponent(el.dataset.uid)}`; }));
  const join = content.querySelector('#btn-join');
  const request = content.querySelector('#btn-request');
  const cancel = content.querySelector('#btn-cancel');
  const leave = content.querySelector('#btn-leave');
  if (join) join.addEventListener('click', () => set(ref(db, `clubs/${clubId}/members/${mySid}`), { role: 'member', name: myName, joinedAt: serverTimestamp() }).catch(e => console.error(e)));
  if (request) request.addEventListener('click', () => {
    set(ref(db, `clubs/${clubId}/requests/${mySid}`), { name: myName, ts: serverTimestamp() })
      .then(() => notifyManagers(currentClub, myName)).catch(e => console.error(e));
  });
  if (cancel) cancel.addEventListener('click', () => remove(ref(db, `clubs/${clubId}/requests/${mySid}`)).catch(e => console.error(e)));
  if (leave) leave.addEventListener('click', () => { if (confirm('ออกจากซุ้มนี้?')) remove(ref(db, `clubs/${clubId}/members/${mySid}`)).catch(e => console.error(e)); });

  // ── จัดการ (เจ้าของ/แอดมิน) ──
  content.querySelectorAll('[data-accept]').forEach(b => b.addEventListener('click', () => acceptRequest(b.dataset.accept)));
  content.querySelectorAll('[data-reject]').forEach(b => b.addEventListener('click', () => remove(ref(db, `clubs/${clubId}/requests/${b.dataset.reject}`)).catch(e => console.error(e))));
  content.querySelectorAll('[data-kick]').forEach(b => b.addEventListener('click', () => {
    const sid = b.dataset.kick;
    const nm = nameOf(sid, (currentClub.members?.[sid]?.name) || 'สมาชิก');
    if (confirm(`เตะ "${nm}" ออกจากซุ้ม?`)) remove(ref(db, `clubs/${clubId}/members/${sid}`)).catch(e => console.error(e));
  }));
  const del = content.querySelector('#btn-delete-club');
  if (del) del.addEventListener('click', async () => {
    if (!confirm('ลบซุ้มนี้ถาวร? สมาชิกทั้งหมดจะถูกนำออกและกู้คืนไม่ได้')) return;
    try { await remove(ref(db, `clubs/${clubId}`)); location.href = 'community.html#clubs'; }
    catch (e) { console.error(e); alert('ลบไม่สำเร็จ'); }
  });

  // ── เฟส 4: มอบตำแหน่ง + ลิงก์เชิญ ──
  content.querySelectorAll('[data-promote]').forEach(b => b.addEventListener('click', () => {
    const sid = b.dataset.promote;
    set(ref(db, `clubs/${clubId}/members/${sid}/role`), 'admin')
      .then(() => notify(sid, 'ได้รับแต่งตั้งเป็นแอดมิน', `คุณเป็นแอดมินของซุ้ม "${currentClub.name || 'ซุ้ม'}" แล้ว`, `club.html?id=${clubId}`))
      .catch(e => console.error(e));
  }));
  content.querySelectorAll('[data-demote]').forEach(b => b.addEventListener('click', () => {
    const sid = b.dataset.demote;
    set(ref(db, `clubs/${clubId}/members/${sid}/role`), 'member')
      .then(() => notify(sid, 'เปลี่ยนตำแหน่งในซุ้ม', `ตำแหน่งของคุณในซุ้ม "${currentClub.name || 'ซุ้ม'}" ถูกปรับเป็นสมาชิก`, `club.html?id=${clubId}`))
      .catch(e => console.error(e));
  }));
  content.querySelectorAll('[data-transfer]').forEach(b => b.addEventListener('click', () => transferOwner(b.dataset.transfer)));

  const inviteBtn = content.querySelector('#btn-invite');
  if (inviteBtn) inviteBtn.addEventListener('click', () => handleInvite(content));

  const inviteJoin = content.querySelector('#btn-invite-join');
  if (inviteJoin) inviteJoin.addEventListener('click', () =>
    set(ref(db, `clubs/${clubId}/members/${mySid}`), { role: 'member', name: myName, joinedAt: serverTimestamp() }).catch(e => console.error(e)));

  const edit = content.querySelector('#btn-edit-club');
  if (edit) edit.addEventListener('click', () => openEdit(currentClub));

  // ── แชทซุ้ม (เฉพาะสมาชิก) — ใช้ข้อมูลจาก listener หลักของซุ้ม ──
  if (myRole) {
    clubChatMessages = Object.values(c.chat || {}).sort((a, b) => (a.ts || 0) - (b.ts || 0));
    if (clubChatMessages.length > CLUB_CHAT_MAX) clubChatMessages = clubChatMessages.slice(-CLUB_CHAT_MAX);
    renderClubChatStream();
    const ci = content.querySelector('#club-chat-text');
    const sendBtn = content.querySelector('#club-chat-send');
    const go = () => sendClubChat(ci);
    if (sendBtn) sendBtn.addEventListener('click', go);
    if (ci) ci.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
  }
}

// ── แก้ไขซุ้ม (เจ้าของ/แอดมิน) ──
let edLogo = '', edCover = '';
function fileToScaledDataURL(file, maxW = 800, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cv.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject; img.src = url;
  });
}
const edOverlay = document.getElementById('edit-overlay');
function openEdit(c) {
  document.getElementById('ed-name').value = c.name || '';
  document.getElementById('ed-desc').value = c.description || '';
  edLogo = c.logo || c.image || '';
  edCover = c.cover || c.image || '';
  document.getElementById('ed-logo-preview').style.backgroundImage = edLogo ? `url("${edLogo}")` : '';
  document.getElementById('ed-cover-preview').style.backgroundImage = edCover ? `url("${edCover}")` : '';
  document.getElementById('ed-msg').textContent = '';
  edOverlay.classList.add('open');
}
function closeEdit() { edOverlay.classList.remove('open'); }
document.getElementById('ed-cancel').addEventListener('click', closeEdit);
edOverlay.addEventListener('click', e => { if (e.target === edOverlay) closeEdit(); });

function wireEdPicker(pickId, clearId, fileId, prevId, maxW, getter, setter, cropWH) {
  document.getElementById(pickId).addEventListener('click', () => document.getElementById(fileId).click());
  document.getElementById(clearId).addEventListener('click', () => { setter(''); document.getElementById(prevId).style.backgroundImage = ''; });
  document.getElementById(fileId).addEventListener('change', async e => {
    const f = e.target.files && e.target.files[0]; if (!f) return;
    try {
      if (cropWH && !window.openCoverCropper) { alert('ไม่พบไฟล์ cropper.js — กรุณาวาง cropper.js ที่โฟลเดอร์หลักของโปรเจกต์ (ระดับเดียวกับ game.js) แล้วกด Ctrl+F5'); e.target.value = ''; return; }
      const d = cropWH ? await window.openCoverCropper(f, cropWH[0], cropWH[1]) : await fileToScaledDataURL(f, maxW);
      e.target.value = '';
      if (!d) return;   // กดยกเลิกครอป
      setter(d); document.getElementById(prevId).style.backgroundImage = `url("${d}")`;
    }
    catch (err) { document.getElementById('ed-msg').textContent = 'อ่านรูปไม่สำเร็จ'; }
  });
}
wireEdPicker('ed-logo-pick', 'ed-logo-clear', 'ed-logo-file', 'ed-logo-preview', 400, () => edLogo, v => edLogo = v);
wireEdPicker('ed-cover-pick', 'ed-cover-clear', 'ed-cover-file', 'ed-cover-preview', 1200, () => edCover, v => edCover = v, [1920, 600]);

document.getElementById('ed-save').addEventListener('click', async () => {
  const name = document.getElementById('ed-name').value.trim();
  const msg = document.getElementById('ed-msg');
  if (!name) { msg.textContent = 'กรุณาใส่ชื่อซุ้ม'; return; }
  msg.textContent = 'กำลังบันทึก…';
  try {
    await update(ref(db, `clubs/${clubId}`), {
      name,
      description: document.getElementById('ed-desc').value.trim(),
      logo: edLogo || '',
      cover: edCover || ''
    });
    closeEdit();
  } catch (e) {
    msg.textContent = (e && e.message && e.message.includes('exceed')) ? 'รูปใหญ่เกินไป ลองรูปเล็กลง' : 'บันทึกไม่สำเร็จ';
  }
});

function inviteUrl(token) { return `${location.origin}${location.pathname}?id=${encodeURIComponent(clubId)}&invite=${encodeURIComponent(token)}`; }

// เขียนแจ้งเตือนถึงผู้ใช้คนเดียว
function notify(sid, title, message, link) {
  if (!sid || sid === mySid) return;
  push(ref(db, `notifications/${sid}`), { type: 'club', title, message, link: link || '', ts: serverTimestamp(), read: false }).catch(() => {});
}

// แจ้งเตือนเจ้าของ/แอดมินว่ามีคำขอเข้าร่วม
function notifyManagers(club, requesterName) {
  if (!club || !club.members) return;
  const note = {
    type: 'club_request',
    title: 'คำขอเข้าซุ้ม',
    message: `${requesterName} ขอเข้าร่วมซุ้ม "${club.name || 'ซุ้ม'}"`,
    link: `club.html?id=${clubId}`,
    ts: serverTimestamp(),
    read: false
  };
  Object.entries(club.members).forEach(([sid, m]) => {
    if ((m.role === 'owner' || m.role === 'admin') && sid !== mySid) {
      push(ref(db, `notifications/${sid}`), note).catch(() => {});
    }
  });
}

// โอนความเป็นเจ้าของ (atomic): คนใหม่=owner, เรา=admin
async function transferOwner(sid) {
  const nm = nameOf(sid, (currentClub.members && currentClub.members[sid] && currentClub.members[sid].name) || 'สมาชิก');
  if (!confirm(`โอนความเป็นเจ้าของซุ้มให้ "${nm}"? คุณจะกลายเป็นแอดมิน`)) return;
  try {
    await update(ref(db, `clubs/${clubId}`), {
      [`members/${sid}/role`]: 'owner',
      [`members/${mySid}/role`]: 'admin',
      ownerUid: sid,
      ownerName: nm
    });
    notify(sid, 'ได้รับโอนเป็นเจ้าของซุ้ม', `คุณเป็นเจ้าของซุ้ม "${currentClub.name || 'ซุ้ม'}" แล้ว`, `club.html?id=${clubId}`);
  } catch (e) { console.error('โอนเจ้าของไม่สำเร็จ:', e); }
}

// สร้าง (ถ้ายังไม่มี) แล้วคัดลอกลิงก์เชิญ
async function handleInvite(content) {
  let token = currentClub && currentClub.inviteToken;
  try {
    if (!token) {
      token = Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6);
      await set(ref(db, `clubs/${clubId}/inviteToken`), token);
    }
    const url = inviteUrl(token);
    const input = content.querySelector('#invite-link');
    if (input) input.value = url;
    try { await navigator.clipboard.writeText(url); } catch (e) { if (input) input.select(); }
    const btn = content.querySelector('#btn-invite');
    if (btn) { btn.textContent = 'คัดลอกแล้ว ✓'; setTimeout(() => { btn.textContent = 'คัดลอกลิงก์'; }, 1600); }
  } catch (e) { console.error('สร้างลิงก์เชิญไม่สำเร็จ:', e); }
}

// รับคำขอ: ย้ายจาก requests → members แล้วลบคำขอ
async function acceptRequest(sid) {
  const r = currentClub && currentClub.requests ? currentClub.requests[sid] : null;
  const nm = r && r.name ? r.name : 'ผู้เล่น';
  try {
    await set(ref(db, `clubs/${clubId}/members/${sid}`), { role: 'member', name: nm, joinedAt: serverTimestamp() });
    await remove(ref(db, `clubs/${clubId}/requests/${sid}`));
    notify(sid, 'ได้รับอนุมัติเข้าซุ้ม', `คำขอเข้าซุ้ม "${currentClub.name || 'ซุ้ม'}" ได้รับการอนุมัติแล้ว`, `club.html?id=${clubId}`);
  } catch (e) { console.error('รับคำขอไม่สำเร็จ:', e); }
}

// ═══════ แชทซุ้ม (เฉพาะสมาชิก — gate ฝั่ง client) ═══════
const CLUB_CHAT_MAX = 200;
let clubChatMessages = [];
function chatTime(ts) { if (!ts) return ''; return new Date(ts).toLocaleString('th-TH', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }); }
// แปลงข้อความเป็น HTML: escape ก่อน (กัน XSS) แล้วทำ URL ให้กดได้
function linkify(text) {
  const safe = esc(text);
  return safe.replace(/(https?:\/\/[^\s<]+)/g, (url) =>
    `<a href="${url}" target="_blank" rel="noopener noreferrer nofollow" class="chat-link">${url}</a>`);
}
function renderClubChatStream() {
  const stream = document.getElementById('club-chat-stream');
  if (!stream) return;
  if (!clubChatMessages.length) { stream.innerHTML = '<div class="ccl-empty">ยังไม่มีข้อความ — เริ่มคุยกันได้เลย 👋</div>'; return; }
  const atBottom = stream.scrollHeight - stream.scrollTop - stream.clientHeight < 80;
  stream.innerHTML = clubChatMessages.map(m => {
    const sid = safeId(m.uid);
    return `<div class="ccl-msg">
      <div class="ccl-av" data-uid="${esc(sid)}">${avatarOf(sid, m.name)}</div>
      <div class="ccl-b">
        <div class="ccl-meta"><span class="ccl-name" data-uid="${esc(sid)}">${esc(nameOf(sid, m.name))}</span><span class="ccl-time">${chatTime(m.ts)}</span></div>
        <div class="ccl-text">${linkify(m.text)}</div>
      </div></div>`;
  }).join('');
  stream.querySelectorAll('[data-uid]').forEach(el => el.addEventListener('click', () => { if (el.dataset.uid) location.href = `profile.html?user=${encodeURIComponent(el.dataset.uid)}`; }));
  if (atBottom) stream.scrollTop = stream.scrollHeight;
}
async function sendClubChat(input) {
  const t = input.value.trim();
  if (!t || !mySid) return;
  input.value = '';
  try {
    await push(ref(db, `clubs/${clubId}/chat`), { uid: currentUser.id, name: myName, text: t, ts: serverTimestamp() });
    trimClubChat();
  } catch (e) { console.error('ส่งแชทไม่สำเร็จ:', e); }
}
async function trimClubChat() {
  try {
    const snap = await get(ref(db, `clubs/${clubId}/chat`));
    const all = [];
    snap.forEach(ch => all.push({ key: ch.key, ts: ch.val().ts || 0 }));
    if (all.length > CLUB_CHAT_MAX) {
      all.sort((a, b) => a.ts - b.ts);
      const extra = all.length - CLUB_CHAT_MAX;
      for (let i = 0; i < extra; i++) remove(ref(db, `clubs/${clubId}/chat/${all[i].key}`)).catch(() => {});
    }
  } catch (e) { /* เงียบ */ }
}

if (!clubId) {
  document.getElementById('club-content').innerHTML = '<div class="club-missing">ไม่พบรหัสซุ้ม</div>';
} else {
  get(ref(db, 'users')).then(s => { usersMap = s.val() || {}; }).catch(() => {}).finally(() => {
    onValue(ref(db, `clubs/${clubId}`), (snap) => render(snap.val()),
      (err) => { document.getElementById('club-content').innerHTML = `<div class="club-missing">โหลดซุ้มไม่ได้: ${esc(err.code || err.message)}</div>`; });
  });
}
</script>
